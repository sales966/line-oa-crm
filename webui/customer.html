<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>客戶詳情 — LINE OA 客戶進度中樞</title>
<link rel="stylesheet" href="app.css">
<style>
/* ===== 檔案牆分兩區(LINE 下載 / 工作台上傳)+ docRole 分類 + 缺檔補件 ===== */
.file-region { margin-top: 6px; }
.file-region + .file-region { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
.file-region-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.file-region-title { font-size: 13px; font-weight: 700; color: var(--text); }
.file-region-count { display: inline-block; min-width: 18px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-soft); background: #f1f5f9; border-radius: 999px; padding: 0 6px; margin-left: 2px; }
.file-region-empty { font-size: 12px; color: var(--text-faint); padding: 6px 2px 2px; }

/* 每卡的來源列改為可換行,容納 docRole 徽章 */
.file-src-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

/* docRole 徽章:報價單金色、回簽單綠色,其餘中性;可點者顯示手指游標 */
.badge.docrole { font-size: 10px; padding: 1px 7px; font-weight: 700; }
.badge.docrole.dr-quote  { background: #fdf1d6; color: #b45309; }
.badge.docrole.dr-signed { background: var(--green-soft); color: #15803d; }
.badge.docrole.dr-design { background: #f5f0ff; color: #7c3aed; }
.badge.docrole.dr-knife  { background: #eef2f6; color: #475569; }
.badge.docrole.dr-other  { background: #f3f4f6; color: #374151; }
.badge.docrole.dr-add    { background: transparent; color: var(--text-faint); border: 1px dashed var(--border); font-weight: 600; }
.fc-role-badge { cursor: pointer; }
.fc-role-badge:hover { filter: brightness(0.96); }

/* docRole 分類標籤(與檔案類型標籤同列,虛線邊框以區隔) */
.file-tab.role-tab { border-style: dashed; }
.file-tab.role-tab.active { border-style: solid; color: #fff; }
.file-tab.role-tab.dr-quote.active  { background: #b45309; border-color: #b45309; }
.file-tab.role-tab.dr-signed.active { background: #15803d; border-color: #15803d; }

/* 缺檔補件占位卡 */
.file-card.missing { border-style: dashed; background: #fcfcfd; cursor: default; }
.file-card.missing:active { cursor: default; }
.fc-missing-icon { opacity: .5; filter: grayscale(1); }
.fc-missing-note { font-size: 11px; color: #b45309; font-weight: 600; }

/* docRole 修改浮動選單 */
.docrole-menu { position: fixed; z-index: 250; width: 172px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); padding: 6px; }
.docrole-menu-title { font-size: 11px; color: var(--text-soft); padding: 2px 6px 6px; }
.docrole-opt { display: flex; align-items: center; width: 100%; text-align: left; background: transparent; border: none; border-radius: 7px; padding: 6px; cursor: pointer; }
.docrole-opt:hover { background: #f5f7fa; }
.docrole-opt.sel { background: var(--primary-soft); }
.docrole-opt.docrole-clear { font-size: 12px; color: var(--red); justify-content: center; margin-top: 2px; border-top: 1px solid var(--border); padding-top: 8px; }

/* 訂單列:整體 + 各訂單標籤 + 新增訂單 */
.order-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; padding: 10px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
.order-bar-label { font-size: 12px; color: var(--text-soft); font-weight: 700; margin-right: 2px; }
.order-tab { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 999px; background: transparent; cursor: pointer; font-size: 13px; color: var(--text); line-height: 1.3; }
.order-tab:hover { background: #f5f7fa; }
.order-tab.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); font-weight: 700; }
.order-tab .order-tab-sub { font-size: 11px; color: var(--text-soft); }
.order-tab.active .order-tab-sub { color: var(--primary); }
.order-tab-actions { display: inline-flex; gap: 2px; margin-left: 2px; }
.order-tab-mini { border: none; background: transparent; cursor: pointer; font-size: 11px; padding: 1px 3px; border-radius: 6px; opacity: .6; }
.order-tab-mini:hover { opacity: 1; background: rgba(0,0,0,.06); }
.order-add-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px dashed var(--border); border-radius: 999px; background: transparent; cursor: pointer; font-size: 13px; color: var(--text-soft); }
.order-add-btn:hover { border-color: var(--primary); color: var(--primary); }
.order-scope-hint { font-size: 12px; color: var(--primary); margin-left: auto; }
.order-modal-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.order-modal-field label { font-size: 13px; color: var(--text-soft); }
.order-modal-field input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
.order-modal-row { display: flex; gap: 10px; }
.order-modal-row .order-modal-field { flex: 1; }

/* 串流總結預覽:生成中即時增長的文字 + 閃爍游標 */
.stream-live { font-size: 12px; font-weight: 700; color: var(--primary); }
.summary-text.stream-preview { min-height: 1.4em; }
.summary-text.stream-preview.streaming::after {
  content: '▋'; display: inline-block; margin-left: 1px; color: var(--primary);
  animation: streamblink 1s steps(1) infinite;
}
@keyframes streamblink { 50% { opacity: 0; } }

/* ===== 列印 / PDF:平時隱藏,列印時只顯示 #print-root ===== */
#print-root { display: none; }
@media print {
  body > *:not(#print-root) { display: none !important; }
  #print-root { display: block !important; color: #000; font-size: 12pt; line-height: 1.5; }
  #print-root * { color: #000 !important; }
  .pv-title { font-size: 20pt; font-weight: 800; margin: 0 0 2px; }
  .pv-meta { font-size: 10pt; color: #444 !important; margin-bottom: 14px; }
  .pv-section { margin: 0 0 16px; break-inside: avoid; }
  .pv-section > h2 { font-size: 13pt; font-weight: 800; margin: 0 0 6px; padding-bottom: 3px; border-bottom: 2px solid #000; }
  .pv-kv { margin: 2px 0; }
  .pv-kv b { display: inline-block; min-width: 84px; }
  .pv-muted { color: #666 !important; }
  .pv-summary { white-space: pre-wrap; word-break: break-word; }
  .pv-stage { margin: 4px 0 8px; break-inside: avoid; }
  .pv-stage-h { font-weight: 700; margin-bottom: 2px; }
  .pv-count { font-weight: 400; color: #555 !important; }
  .pv-tasks { list-style: none; margin: 0; padding: 0 0 0 4px; }
  .pv-tasks li { margin: 1px 0; }
  .pv-list { margin: 0; padding-left: 18px; }
  .pv-list li { margin: 2px 0; }
  #print-root .kv-table { border-collapse: collapse; margin: 4px 0; width: 100%; }
  #print-root .kv-table th, #print-root .kv-table td { border: 1px solid #999; padding: 3px 8px; text-align: left; font-size: 11pt; }
  #print-root .kv-table th { width: 32%; background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #print-root .section-title { font-weight: 700; margin: 8px 0 3px; }
  #print-root .action-group { margin: 3px 0; }
  #print-root .action-group .role { font-weight: 700; }
  #print-root .action-group ul { margin: 2px 0; padding-left: 18px; }
  @page { margin: 14mm; }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="back" href="index.html">← 返回客戶列表</a>
  <h1 id="page-title">客戶詳情</h1>
  <span class="sub" id="page-sub"></span>
  <span class="sync-ctrl">
    <span class="sync-err-inline" id="sync-error" hidden></span>
    <span id="sync-badge"></span>
    <button type="button" class="btn small" id="full-sync-btn" hidden>🔄 建檔</button>
  </span>
</header>

<main class="page">
  <div id="page-state"></div>

  <!-- 訂單列:整體 + 各訂單標籤(切換總結/進度/時間軸的日期範圍)+ 新增訂單 -->
  <div class="order-bar" id="order-bar" hidden></div>

  <!-- 進度面板:五階段步驟條 + 每階段任務紅綠燈 + 天數/物流參數 -->
  <section class="card progress-card" id="progress-card" hidden>
    <div class="card-head">
      <span>📊 進度</span>
      <span class="progress-lock-wrap">
        <label for="stage-override" class="progress-lock-label">階段鎖定</label>
        <select id="stage-override" class="progress-lock-select" title="手動鎖定階段;選「自動」則依任務推算"></select>
      </span>
    </div>
    <div class="card-body" id="progress-body"></div>
  </section>

  <div class="detail-grid" id="detail-grid" hidden>

    <!-- 左欄:客戶資訊 + 記事本 -->
    <div class="col">
      <section class="card">
        <div class="card-head">客戶資訊</div>
        <div class="card-body" id="info-body"></div>
      </section>
      <section class="card">
        <div class="card-head">LINE 記事本</div>
        <div class="card-body" id="notes-body"></div>
      </section>
    </div>

    <!-- 中欄:對話時間軸 + 內部討論 -->
    <div class="col">
      <section class="card chat-panel">
        <div class="card-head">對話時間軸</div>
        <div class="chat-legend">左=客戶/成員 · 右=我方</div>
        <div class="load-more-wrap" id="load-more-wrap" hidden>
          <button class="btn small" id="load-more-btn">載入更早</button>
        </div>
        <div class="chat-scroll" id="chat-scroll"></div>
      </section>
      <section class="card team-panel">
        <div class="card-head">💬 內部討論</div>
        <div class="team-hint">此區內容客戶看不到,AI 會作為背景記憶納入總結</div>
        <div class="team-scroll" id="team-scroll"></div>
        <div class="team-err" id="team-err" hidden></div>
        <div class="team-upload" id="team-upload" hidden>
          <div class="upload-bar"><div class="upload-fill" id="team-upload-fill"></div></div>
          <span class="upload-label" id="team-upload-label"></span>
        </div>
        <div class="team-input">
          <div class="team-input-main">
            <div class="mention-box" id="mention-box" hidden></div>
            <textarea id="team-input" rows="2" placeholder="輸入內部討論…(Enter 送出,Shift+Enter 換行;輸入 @ 可提及同事或檔案)"></textarea>
          </div>
          <input type="file" id="team-file-input" hidden>
          <button type="button" class="btn team-attach-btn" id="team-attach-btn" title="上傳並分享檔案">📎</button>
          <button type="button" class="btn primary" id="team-send-btn">送出</button>
        </div>
      </section>
    </div>

    <!-- 右欄:AI 總結 + 檔案牆 -->
    <div class="col">
      <section class="card">
        <div class="card-head">
          <span>AI 總結</span>
          <span class="card-head-actions" style="display:flex;gap:6px;">
            <button type="button" class="btn small" id="print-btn" title="列印或另存為 PDF">🖨 列印 / PDF</button>
            <button class="btn small primary" id="regen-btn">重新生成總結</button>
          </span>
        </div>
        <div id="summary-deadline"></div>
        <div class="card-body" id="summary-body"></div>
      </section>
      <section class="card">
        <div class="card-head">
          <span>檔案牆 <span class="sub" id="file-count"></span></span>
        </div>
        <input type="file" id="file-upload-input" hidden>
        <div class="upload-progress" id="upload-progress" hidden>
          <div class="upload-bar"><div class="upload-fill" id="upload-fill"></div></div>
          <span class="upload-label" id="upload-label"></span>
        </div>
        <div class="upload-err" id="upload-err" hidden></div>
        <div class="card-body" id="files-body"></div>
      </section>

      <section class="card">
        <div class="card-head collapsible" id="audit-head" role="button" tabindex="0" aria-expanded="false">
          <span>📜 變更紀錄</span>
          <span class="chev" id="audit-chev">▸</span>
        </div>
        <div class="card-body" id="audit-body" hidden></div>
      </section>
    </div>

  </div>
</main>

<!-- 列印 / PDF 專用視圖(平時隱藏;按「🖨 列印 / PDF」時填入內容並 window.print()) -->
<div id="print-root" aria-hidden="true"></div>

<script src="api.js"></script>
<script>
'use strict';
(function () {
  const $ = (id) => document.getElementById(id);
  const chatId = UI.qsParam('chatId');
  const PAGE_SIZE = 100;

  // 檔案 contentHash → 下載連結(供對話中的檔案訊息點擊下載)
  const fileLinkByHash = {};
  let oldestTs = null;     // 目前已載入最早一筆訊息的 timestamp
  let oldestId = null;     // 目前已載入最早一筆訊息的 id(複合游標 beforeId,避免同毫秒訊息被跳頁)
  let hasMore = false;
  let allMsgs = [];        // 已載入的全部訊息(時間正序);重繪時據此做「同一人連續訊息只顯示一次名字」的視覺分組
  let custName = '';       // 客戶名稱(in 訊息缺 senderName 時的名字後備)
  let custChatType = '';   // USER / GROUP / ROOM(群聊時成員名字加色點區分)

  // 訂單:目前選中的 orderId(0=整體視圖,行為與上線版完全相同);>0=某訂單日期範圍切片
  let currentOrderId = 0;
  let ordersList = [];     // 訂單清單(倒序);由 loadOrders 載入
  // 範圍載入序號:切換訂單 / 重載範圍面板時遞增,各 scoped 載入(進度/總結/對話)於套用結果前
  // 比對捕獲時的序號,序號已變則捨棄——避免舊訂單的慢回應蓋掉新選訂單的畫面(比照 index.html reqSeq)
  let orderReqSeq = 0;

  if (!chatId) {
    $('page-state').innerHTML = UI.errorHtml('缺少 chatId 參數,請從客戶列表進入');
    return;
  }

  const api = '/api/customers/' + encodeURIComponent(chatId);

  // ================= 左欄:客戶資訊 =================
  async function loadCustomer() {
    try {
      const data = await API.get(api);
      const c = (data && (data.customer || data)) || {};
      const name = c.lineName || '(未命名)';
      custName = c.lineName || '';
      const prevChatType = custChatType;
      custChatType = String(c.chatType || '').toUpperCase();
      // chatType 首次載入(或變化)會影響訊息名字的色點顯示 → 已有訊息時重繪
      if (prevChatType !== custChatType && allMsgs.length > 0) renderTimeline(true);
      document.title = name + ' — LINE OA 客戶進度中樞';
      $('page-title').textContent = name;
      $('page-sub').innerHTML = UI.chatTypeBadge(c.chatType) + ' ' + UI.stageBadge(c.currentStage);
      $('info-body').innerHTML =
        '<div class="info-list">' +
        infoRow('客戶名稱', UI.esc(name)) +
        infoRow('聊天類型', UI.chatTypeBadge(c.chatType)) +
        infoRow('目前階段', UI.stageBadge(c.currentStage)) +
        infoRow('待處理', c.followedUp ? '<span class="dot-followup"></span> 是' : '否') +
        infoRow('訊息數', c.msgCount != null ? c.msgCount : '—') +
        infoRow('檔案數', c.fileCount != null ? c.fileCount : '—') +
        infoRow('最後訊息', UI.esc(UI.fmtDateTime(c.lastMessageAt))) +
        infoRow('最後同步', UI.esc(UI.fmtDateTime(c.lastSyncAt))) +
        infoRow('Chat ID', '<span style="font-size:11px;">' + UI.esc(c.lineChatId || chatId) + '</span>') +
        '</div>';
    } catch (e) {
      if (e.status === 404) {
        $('info-body').innerHTML = UI.errorHtml('找不到此客戶');
        $('page-title').textContent = '找不到客戶';
      } else {
        $('info-body').innerHTML = UI.errorHtml('客戶資訊載入失敗:' + e.message);
      }
    }
  }
  function infoRow(k, vHtml) {
    return '<div class="row"><span class="k">' + k + '</span><span class="v">' + vHtml + '</span></div>';
  }

  // ================= 左欄:記事本 =================
  async function loadNotes() {
    const box = $('notes-body');
    box.innerHTML = UI.loadingHtml();
    try {
      const data = await API.get(api + '/notes');
      const notes = (data && data.notes) || [];
      if (notes.length === 0) { box.innerHTML = UI.emptyHtml('尚無記事本內容'); return; }
      box.innerHTML = notes.map(function (n) {
        return '<div class="note-item">' +
          '<div class="body">' + UI.esc(n.body || '') + '</div>' +
          '<div class="meta">' + UI.esc(UI.fmtDateTime(n.updatedAt || n.createdAt)) + '</div>' +
          '</div>';
      }).join('');
    } catch (e) {
      box.innerHTML = UI.errorHtml('記事本載入失敗:' + e.message);
    }
  }

  // ================= 中欄:對話時間軸 =================
  // API 回傳時間倒序;畫面由上到下為時間正序,「載入更早」在頂部往前補。
  async function loadMessages(before, beforeId) {
    const seq = orderReqSeq; // 捕獲當下範圍序號;回應到達時序號已變(切換訂單)則捨棄
    const scroll = $('chat-scroll');
    const btn = $('load-more-btn');
    const firstLoad = !before;
    if (firstLoad) scroll.innerHTML = UI.loadingHtml('載入對話…');
    btn.disabled = true;
    btn.textContent = '載入更早';

    let msgs = [];
    try {
      // orderId>0 → 帶 orderId(後端按 fromDate/toDate 過濾);0 → 現狀不帶。
      // beforeId 併帶時後端走 (timestamp,id) 複合游標,避免頁邊界同毫秒訊息被跳過。
      const data = await API.getMessagesFor(chatId, currentOrderId, {
        limit: PAGE_SIZE,
        before: before || undefined,
        beforeId: (before && beforeId != null) ? beforeId : undefined
      });
      msgs = (data && data.messages) || [];
    } catch (e) {
      if (seq !== orderReqSeq) return; // 已切換訂單,捨棄過期結果
      if (firstLoad) {
        scroll.innerHTML = UI.errorHtml('對話載入失敗:' + e.message);
      } else {
        btn.textContent = '載入失敗,點擊重試'; // 翻頁失敗也要有回饋
      }
      btn.disabled = false;
      return;
    }
    if (seq !== orderReqSeq) return; // 已切換訂單,捨棄過期結果(勿蓋掉新訂單的 allMsgs/畫面)
    btn.disabled = false;

    if (firstLoad && msgs.length === 0) {
      allMsgs = [];
      scroll.innerHTML = UI.emptyHtml('尚無對話訊息');
      $('load-more-wrap').hidden = true;
      return;
    }

    hasMore = msgs.length >= PAGE_SIZE;
    $('load-more-wrap').hidden = !hasMore;
    if (msgs.length > 0) {
      oldestTs = msgs[msgs.length - 1].timestamp; // 倒序:最後一筆最早
      oldestId = msgs[msgs.length - 1].id;         // 複合游標:同毫秒時以 id 續接
    }

    // 倒序 → 正序;維護 allMsgs 全量陣列後整體重繪——
    // 「載入更早」補頁時,原本頁首那筆的名字標籤可能因與補入的最後一筆同人而要收起,
    // 局部 prepend 無法處理跨頁分組,整體重繪最單純可靠(頁量 100/頁,成本可忽略)
    const page = msgs.slice().reverse();
    if (firstLoad) {
      allMsgs = page;
      renderTimeline(false);
      scroll.scrollTop = scroll.scrollHeight; // 捲到最新
    } else {
      allMsgs = page.concat(allMsgs);
      const prevHeight = scroll.scrollHeight;
      renderTimeline(false);
      scroll.scrollTop = scroll.scrollHeight - prevHeight; // 維持視覺位置
    }
  }

  /** 依 allMsgs 重繪整條時間軸;keepScroll=true 時維持目前捲動位置(chatType 後到重繪用) */
  function renderTimeline(keepScroll) {
    const scroll = $('chat-scroll');
    const prevTop = scroll.scrollTop;
    let html = '';
    let prevKey = null;
    for (let i = 0; i < allMsgs.length; i++) {
      const m = allMsgs[i];
      const dir = m.direction === 'out' ? 'out' : 'in';
      // 視覺分組鍵:out 一律視為「我方」同一組;in 依 senderUserId(缺則 senderName,再缺則整組視為客戶)
      const key = dir === 'out' ? 'out' : 'in|' + String(m.senderUserId || m.senderName || '');
      html += renderMsg(m, dir, key !== prevKey);
      prevKey = key;
    }
    scroll.innerHTML = html;
    if (keepScroll) scroll.scrollTop = prevTop;
  }

  // 群聊成員名字 → 6 色盤色點(簡單字串 hash,同名恆同色)
  const SENDER_COLORS = ['#e11d48', '#d97706', '#059669', '#2563eb', '#7c3aed', '#0891b2'];
  function senderColor(name) {
    let h = 0;
    const s = String(name || '');
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return SENDER_COLORS[h % SENDER_COLORS.length];
  }

  /** 氣泡上方的發送者小字:out=「我方」;in=senderName(缺則客戶名);GROUP 加色點 */
  function senderLabel(m, dir) {
    if (dir === 'out') return '<div class="sender">我方</div>';
    const name = m.senderName || custName || '客戶';
    let dot = '';
    if (custChatType === 'GROUP') {
      dot = '<span class="sender-dot" style="background:' + senderColor(name) + '"></span>';
    }
    return '<div class="sender">' + dot + UI.esc(name) + '</div>';
  }

  function renderMsg(m, dir, showSender) {
    let inner;
    const type = (m.msgType || '').toLowerCase();
    if (type === 'image') {
      // 1:1 還原:已下載 → 內嵌縮圖(點擊開大圖);未下載 → 佔位
      const url = m.contentHash && fileLinkByHash[m.contentHash];
      if (url) {
        inner = '<a href="' + UI.esc(url) + '" target="_blank" rel="noopener" class="chat-img-link">' +
          '<img class="chat-img" src="' + UI.esc(url) + '" alt="圖片" loading="lazy"></a>';
      } else {
        inner = '<span class="media-ph">📷 圖片(同步中)</span>';
      }
    } else if (type === 'sticker') {
      // 貼圖:用 stickerId 組 LINE CDN 圖(1:1 還原);缺 id 則文字佔位
      if (m.stickerId) {
        const su = 'https://stickershop.line-scdn.net/stickershop/v1/sticker/' +
          encodeURIComponent(m.stickerId) + '/iPhone/sticker.png';
        inner = '<img class="sticker-img" src="' + UI.esc(su) + '" alt="貼圖" loading="lazy" ' +
          'onerror="this.replaceWith(document.createTextNode(\'😀 貼圖\'))">';
      } else {
        inner = '<span class="media-ph">😀 貼圖</span>';
      }
    } else if (type === 'file' || (m.fileName && type !== 'text')) {
      const sizeStr = UI.fmtSize(m.fileSize);
      inner = fileOrPlain(m, '📎 ' + UI.esc(m.fileName || '檔案') + (sizeStr ? '(' + sizeStr + ')' : ''), 'file-card');
    } else if (type === 'video') {
      inner = fileOrPlain(m, '🎬 影片', 'media-ph');
    } else if (type === 'audio') {
      inner = fileOrPlain(m, '🎤 語音', 'media-ph');
    } else if (m.text) {
      inner = UI.esc(m.text);
    } else {
      inner = '<span class="media-ph">[' + UI.esc(m.msgType || m.eventType || '訊息') + ']</span>';
    }
    let bubbleCls = 'bubble';
    if (type === 'image' && m.contentHash && fileLinkByHash[m.contentHash]) bubbleCls += ' has-media';
    else if (type === 'sticker' && m.stickerId) bubbleCls += ' is-sticker';
    return '<div class="msg-row ' + dir + '"><div class="msg-col">' +
      (showSender ? senderLabel(m, dir) : '') +
      '<div class="' + bubbleCls + '">' + inner +
      '<span class="time">' + UI.esc(UI.fmtDateTime(m.timestamp)) + '</span></div></div></div>';
  }

  // 有對應已下載檔案 → 可點下載;否則純文字顯示
  function fileOrPlain(m, labelHtml, cls) {
    const url = m.contentHash && fileLinkByHash[m.contentHash];
    if (url) {
      return '<a class="file-link ' + cls + '" href="' + UI.esc(url) + '" title="下載">' + labelHtml + '</a>';
    }
    return '<span class="' + cls + '">' + labelHtml + '</span>';
  }

  $('load-more-btn').addEventListener('click', function () {
    if (hasMore && oldestTs != null) loadMessages(oldestTs, oldestId);
  });

  // ================= 右欄:AI 總結 =================
  let hasSummary = false; // 是否已存在總結(決定「重新生成總結」是否帶 force)

  async function loadSummary() {
    const seq = orderReqSeq; // 捕獲當下範圍序號;回應到達時序號已變(切換訂單)則捨棄
    const box = $('summary-body');
    box.innerHTML = UI.loadingHtml();
    try {
      const data = await API.getSummariesFor(chatId, currentOrderId);
      if (seq !== orderReqSeq) return; // 已切換訂單,捨棄過期結果
      const list = (data && data.summaries) || [];
      if (list.length === 0) { renderSummary(null); return; }
      // 保險起見依 createdAt 取最新
      list.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
      renderSummary(list[0]);
    } catch (e) {
      if (seq !== orderReqSeq) return; // 已切換訂單,捨棄過期錯誤
      box.innerHTML = UI.errorHtml('總結載入失敗:' + e.message);
    }
  }

  let currentSummary = null; // 目前顯示的總結(供編輯/批注用)

  // 顯示文字:editedText 非空優先,否則 AI 原文
  function summaryDisplayText(s) {
    const edited = s.editedText != null ? String(s.editedText) : '';
    return edited.trim() ? edited : (s.summaryText || '');
  }
  function isSummaryEdited(s) {
    return !!(s && s.editedText != null && String(s.editedText).trim());
  }

  function renderSummary(s) {
    const box = $('summary-body');
    currentSummary = s;
    hasSummary = !!s;
    // 從未生成過總結時按鈕叫「產生總結」;已有總結才叫「重新生成總結」
    $('regen-btn').textContent = s ? '重新生成總結' : '產生總結';
    if (!s) {
      box.innerHTML = UI.emptyHtml('尚無總結,點右上「產生總結」') + '<div class="summarize-err" id="summarize-err"></div>';
      return;
    }
    const edited = isSummaryEdited(s);
    let html = '';
    html += '<div class="summary-badge-row">' + UI.stageBadge(s.stageGuess) +
      (edited ? '<span class="edited-tag" title="人工修改版(優先於 AI 原文)">✏ 已由 ' +
        UI.esc(s.editedByName || '同事') + ' 修改</span>' : '') + '</div>';
    html += '<div class="summary-text" id="summary-display">' + UI.esc(summaryDisplayText(s) || '(無內容)') + '</div>';
    html += '<div class="summary-ctrls">' +
      '<button type="button" class="btn tiny" data-act="edit">編輯</button>' +
      (edited ? '<button type="button" class="btn tiny" data-act="revert">還原</button>' : '') +
      '<button type="button" class="btn tiny" data-act="annotate">批注</button>' +
      '</div>';
    html += renderSummaryFacts(s);
    html += '<div class="section-title">批注</div><div id="annotations-box"><div class="anno-empty">載入中…</div></div>';
    html += '<div class="summary-meta">產生於 ' + UI.esc(UI.fmtDateTime(s.createdAt)) +
      (s.model ? ' · ' + UI.esc(s.model) : '') +
      (edited && s.editedAt ? ' · 編輯於 ' + UI.esc(UI.fmtDateTime(s.editedAt)) : '') + '</div>';
    html += '<div class="summarize-err" id="summarize-err"></div>';
    box.innerHTML = html;
    loadAnnotations(s.id);
  }

  // AI 原始結構化欄位(keyFacts / nextActions);人工編輯不影響
  function renderSummaryFacts(s) {
    let html = '';
    const facts = UI.parseMaybeJson(s.keyFacts);
    if (facts && typeof facts === 'object') {
      const keys = Object.keys(facts).filter(function (k) {
        const v = facts[k];
        return v !== null && v !== undefined && String(v).trim() !== '';
      });
      if (keys.length > 0) {
        html += '<div class="section-title">關鍵資訊</div><table class="kv-table">';
        keys.forEach(function (k) {
          html += '<tr><th>' + UI.esc(k) + '</th><td>' + UI.esc(String(facts[k])) + '</td></tr>';
        });
        html += '</table>';
      }
    }
    // nextActions:[{role, action}],依角色分組(role 可能是簡體,顯示轉繁體)
    const ROLE_MAP = { '跟单': '跟單', '跟單': '跟單', '设计': '設計', '設計': '設計', '客服': '客服', '报价': '報價', '報價': '報價' };
    const actions = UI.parseMaybeJson(s.nextActions);
    if (Array.isArray(actions) && actions.length > 0) {
      const byRole = {};
      actions.forEach(function (a) {
        if (!a) return;
        const role = ROLE_MAP[a.role] || a.role || '其他';
        (byRole[role] = byRole[role] || []).push(a.action || String(a));
      });
      html += '<div class="section-title">建議下一步</div>';
      Object.keys(byRole).forEach(function (role) {
        html += '<div class="action-group"><div class="role">' + UI.esc(role) + '</div><ul>' +
          byRole[role].map(function (act) { return '<li>' + UI.esc(act) + '</li>'; }).join('') +
          '</ul></div>';
      });
    }
    return html;
  }

  // ---- 總結:人工編輯 / 還原 / 批注 ----
  $('summary-body').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'edit') startEditSummary();
    else if (act === 'revert') revertSummary();
    else if (act === 'annotate') startAnnotation();
  });

  function startEditSummary() {
    if (!currentSummary) return;
    const disp = $('summary-display');
    if (!disp || disp.querySelector('textarea')) return;
    const cur = summaryDisplayText(currentSummary);
    disp.textContent = '';
    const ta = document.createElement('textarea');
    ta.className = 'summary-edit-ta';
    ta.rows = 7;
    ta.value = cur;
    const row = document.createElement('div');
    row.className = 'summary-edit-actions';
    const save = document.createElement('button');
    save.type = 'button'; save.className = 'btn tiny primary'; save.textContent = '儲存';
    const cancel = document.createElement('button');
    cancel.type = 'button'; cancel.className = 'btn tiny'; cancel.textContent = '取消';
    const err = document.createElement('span');
    err.className = 'summary-edit-err';
    row.appendChild(save); row.appendChild(cancel); row.appendChild(err);
    disp.appendChild(ta); disp.appendChild(row);
    ta.focus();
    cancel.addEventListener('click', function () { renderSummary(currentSummary); });
    save.addEventListener('click', async function () {
      const text = ta.value.trim();
      if (!text) { err.textContent = '內容不得為空(要清除人工版請用「還原」)'; return; }
      save.disabled = true; cancel.disabled = true;
      try {
        await API.editSummary(chatId, currentSummary.id, text);
        await loadSummary();
        refreshAuditIfOpen();
      } catch (e2) {
        err.textContent = '儲存失敗:' + e2.message;
        save.disabled = false; cancel.disabled = false;
      }
    });
  }

  async function revertSummary() {
    if (!currentSummary) return;
    if (!confirm('確定還原為 AI 原始總結?將清除人工修改內容。')) return;
    try {
      await API.editSummary(chatId, currentSummary.id, '');
      await loadSummary();
      refreshAuditIfOpen();
    } catch (e) { alert('還原失敗:' + e.message); }
  }

  function startAnnotation() {
    if (!currentSummary) return;
    const box = $('annotations-box');
    if (!box || box.querySelector('.annotation-form')) return;
    const form = document.createElement('div');
    form.className = 'annotation-form';
    const ta = document.createElement('textarea');
    ta.rows = 2; ta.placeholder = '輸入批注(不會改動總結原文)…';
    const row = document.createElement('div');
    row.className = 'summary-edit-actions';
    const send = document.createElement('button');
    send.type = 'button'; send.className = 'btn tiny primary'; send.textContent = '送出';
    const cancel = document.createElement('button');
    cancel.type = 'button'; cancel.className = 'btn tiny'; cancel.textContent = '取消';
    const err = document.createElement('span');
    err.className = 'summary-edit-err';
    row.appendChild(send); row.appendChild(cancel); row.appendChild(err);
    form.appendChild(ta); form.appendChild(row);
    box.insertBefore(form, box.firstChild);
    ta.focus();
    cancel.addEventListener('click', function () { form.remove(); });
    send.addEventListener('click', async function () {
      const text = ta.value.trim();
      if (!text) { err.textContent = '批注不得為空'; return; }
      send.disabled = true; cancel.disabled = true;
      try {
        await API.addAnnotation(chatId, currentSummary.id, text);
        loadAnnotations(currentSummary.id);
        refreshAuditIfOpen();
      } catch (e) {
        err.textContent = '送出失敗:' + e.message;
        send.disabled = false; cancel.disabled = false;
      }
    });
  }

  async function loadAnnotations(summaryId) {
    const box = $('annotations-box');
    if (!box || summaryId == null) return;
    let list = [];
    try {
      const data = await API.getAnnotations(chatId, summaryId);
      list = (data && data.annotations) || [];
    } catch (e) {
      box.innerHTML = '<div class="anno-empty">批注載入失敗</div>';
      return;
    }
    const listHtml = list.length === 0
      ? '<div class="anno-empty">尚無批注</div>'
      : list.map(function (a) {
          return '<div class="anno-item"><div class="anno-meta">' +
            UI.esc(a.userName || '同事') + ' · ' + UI.esc(UI.fmtDateTime(a.createdAt)) +
            '</div><div class="anno-body">' + UI.esc(a.body || '') + '</div></div>';
        }).join('');
    box.innerHTML = listHtml;
  }

  // 重新生成總結(優先串流 SSE;串流不支援/失敗一律自動退回既有非串流 POST,行為與現行一致)
  $('regen-btn').addEventListener('click', async function () {
    const btn = this;
    btn.disabled = true;
    const orig = btn.textContent;
    // 顯示經過秒數:gpt-5.5 約 30–60 秒,讓「慢」有可見進度、不像卡死
    const t0 = Date.now();
    btn.innerHTML = '<span class="spinner"></span> 生成中… 0s';
    const tick = setInterval(function () {
      const s = Math.round((Date.now() - t0) / 1000);
      btn.innerHTML = '<span class="spinner"></span> 生成中… ' + s + 's' + (s >= 25 ? '(約需30-60秒)' : '');
    }, 1000);
    const errBox = () => $('summarize-err');
    if (errBox()) errBox().textContent = '';

    // 已有總結時(按鈕文案「重新生成總結」)必須帶 force=1;首次「產生總結」不帶(與現行一致)。
    const useForce = hasSummary;
    const box = $('summary-body');
    const prevBodyHtml = box.innerHTML; // 串流失敗時原樣還原,再走既有非串流路徑(絕不比現在差)

    // 既有非串流路徑:與上線版一字不差(串流不支援/失敗時退回)
    async function runNonStream() {
      try {
        // 依契約緩存規則,已有總結不帶 force 會直接回 cached(等於沒點);故帶 force=1。
        const data = await API.summarizeFor(chatId, currentOrderId, useForce);
        if (data && data.summary) {
          renderSummary(data.summary);
        } else {
          await loadSummary();
        }
        loadCustomer();  // 階段可能被更新
        loadProgress();  // 生成總結會依 LLM 判定更新 stage_tasks 紅綠燈 → 重新載入進度面板
      } catch (e) {
        const msg = e.status === 503
          ? 'LLM 未設定,請在 backend/.env 填入 OPENAI_API_KEY'
          : '生成失敗:' + e.message;
        if (errBox()) errBox().textContent = msg;
        else alert(msg);
      }
    }

    // 串流預覽區:文字持續增長 + 游標閃爍(不動按鈕倒數;done 前不呼叫 renderSummary)
    let streamed = '';
    let previewShown = false;
    function showPreview() {
      box.innerHTML =
        '<div class="summary-badge-row"><span class="stream-live">✨ 生成中(串流)…</span></div>' +
        '<div class="summary-text stream-preview streaming" id="stream-preview-text"></div>' +
        '<div class="summarize-err" id="summarize-err"></div>';
      previewShown = true;
    }
    function onDelta(textChunk) {
      if (!previewShown) showPreview();
      // 後端每次 delta 送的是「累積快照」(從頭到目前的完整 summaryText),非增量片段 →
      // 必須 REPLACE 覆蓋,不可 += 累加(累加會把每次完整快照疊在前一份完整快照上 → 重複亂碼)。
      streamed = textChunk;
      const el = $('stream-preview-text');
      if (el) el.textContent = streamed; // XSS 安全:純文字寫入
    }

    try {
      // done 回傳的 summary 走既有 renderSummary(燈號/死線/檔案角色渲染照舊,與非串流成功一模一樣)
      const summary = await API.summarizeStream(chatId, {
        force: useForce,
        orderId: currentOrderId,
        onDelta: onDelta
      });
      renderSummary(summary);
      loadCustomer();  // 階段可能被更新
      loadProgress();  // 依 LLM 判定更新紅綠燈 → 重新載入進度面板
    } catch (e) {
      // 串流任何失敗(不支援 / 網路斷 / 非 2xx / SSE 錯 / 未收到 done):
      // 還原畫面後退回既有非串流 POST,保證「串流壞了也絕不比現在差」。
      box.innerHTML = prevBodyHtml;
      await runNonStream();
    } finally {
      clearInterval(tick);
      btn.disabled = false;
      // 成功時 renderSummary 已更新按鈕文字;若仍停在「生成中…」(失敗路徑)則還原
      if (btn.textContent.indexOf('生成中') !== -1) btn.textContent = orig;
    }
  });

  // ---- 列印 / PDF:組列印友善視圖(客戶名/階段/死線/總結重點/進度燈號/訂單)→ window.print() ----
  function buildPrintView() {
    const name = custName || ($('page-title') ? $('page-title').textContent : '') || '客戶';
    const p = progressData || {};
    const stage = p.currentStage || '—';

    // 目前檢視範圍(整體 / 某訂單)
    let scopeLabel = '整體';
    if (currentOrderId !== 0) {
      const o = findOrder(currentOrderId);
      scopeLabel = o ? orderTabTitle(o) : ('訂單 #' + currentOrderId);
    }

    // 大貨死線
    let dlHtml = '<span class="pv-muted">尚未設定</span>';
    const d = p.deadline || {};
    if (d.at) {
      const dl = d.daysLeft;
      let tag = '';
      if (dl < 0) tag = '(已逾期 ' + Math.abs(dl) + ' 天)';
      else if (dl === 0) tag = '(今天到期)';
      else tag = '(剩 ' + dl + ' 天)';
      dlHtml = UI.esc(UI.fmtDate(d.at)) + ' ' + UI.esc(tag) +
        (d.source === 'manual' ? ' · 人工設定' : ' · AI 推算') +
        (d.evidence ? '<div class="pv-kv pv-muted">依據:' + UI.esc(d.evidence) + '</div>' : '');
    }

    // 總結重點(沿用既有顯示文字 + 結構化欄位渲染,皆已 escape)
    let summaryHtml = '<div class="pv-muted">尚無總結</div>';
    if (currentSummary) {
      summaryHtml = '<div class="pv-summary">' +
        UI.esc(summaryDisplayText(currentSummary) || '(無內容)') + '</div>' +
        renderSummaryFacts(currentSummary);
    }

    // 進度燈號(逐階段任務紅綠燈)
    const stages = (p.stages && p.stages.length) ? p.stages : [];
    let progressHtml = stages.length ? stages.map(function (st) {
      const tasks = st.tasks || [];
      const doneN = tasks.filter(function (t) { return t.done; }).length;
      const rows = tasks.length
        ? tasks.map(function (t) {
            return '<li>' + (t.done ? '🟢' : '🔴') + ' ' + UI.esc(t.label) + '</li>';
          }).join('')
        : '<li class="pv-muted">此階段無任務</li>';
      return '<div class="pv-stage"><div class="pv-stage-h">' + UI.esc(st.stage) +
        ' <span class="pv-count">' + doneN + '/' + tasks.length + '</span></div>' +
        '<ul class="pv-tasks">' + rows + '</ul></div>';
    }).join('') : '<div class="pv-muted">尚無進度資料</div>';

    // 訂單清單
    let ordersHtml = (ordersList && ordersList.length)
      ? '<ul class="pv-list">' + ordersList.map(function (o) {
          const range = orderRangeLabel(o);
          return '<li>' + UI.esc(orderTabTitle(o)) + (range ? ' · ' + UI.esc(range) : '') + '</li>';
        }).join('') + '</ul>'
      : '<div class="pv-muted">尚無訂單</div>';

    const u = (typeof API.getUser === 'function' && API.getUser()) || null;
    const meta = '列印時間 ' + UI.esc(UI.fmtDateTime(Date.now())) +
      (u ? ' · 列印者 ' + UI.esc(u.name || '') : '') +
      ' · 檢視範圍:' + UI.esc(scopeLabel);

    return '<div class="pv-title">' + UI.esc(name) + '</div>' +
      '<div class="pv-meta">' + meta + '</div>' +
      '<div class="pv-section"><div class="pv-kv"><b>目前階段</b>' + UI.esc(UI.stageLabel(stage)) + '</div>' +
      '<div class="pv-kv"><b>大貨死線</b>' + dlHtml + '</div></div>' +
      '<div class="pv-section"><h2>總結重點</h2>' + summaryHtml + '</div>' +
      '<div class="pv-section"><h2>進度燈號</h2>' + progressHtml + '</div>' +
      '<div class="pv-section"><h2>訂單</h2>' + ordersHtml + '</div>';
  }

  $('print-btn').addEventListener('click', function () {
    const root = $('print-root');
    if (!root) return;
    root.innerHTML = buildPrintView();
    window.print();
  });

  // ================= 右欄:檔案牆(兩區:LINE 下載 / 工作台上傳 · 分類 · docRole · 縮圖燈箱) =================
  let allFiles = [];       // 全部實體檔案(已排序,含 _cat / docRole)
  let missingFiles = [];   // 缺檔占位(messages 有 contentHash 但無實體;虛擬檔,含 _cat / _missing)
  let fileTab = 'all';     // 目前篩選:'all' | 檔案類型 cat | 'role:'+docRole
  const CAT_LABEL = { all: '全部', image: '圖片', pdf: 'PDF', design: '設計檔', doc: '文件', other: '其他' };
  const CAT_ORDER = ['all', 'image', 'pdf', 'design', 'doc', 'other'];
  // docRole 分類:只在有該類(實體或占位)時顯示標籤;報價單金色、回簽單綠色,其餘中性
  const DOCROLE_ORDER = ['報價單', '回簽單', '設計圖', '刀模'];
  const DOCROLE_CLASS = { '報價單': 'dr-quote', '回簽單': 'dr-signed', '設計圖': 'dr-design', '刀模': 'dr-knife', '其他': 'dr-other' };
  const DOCROLE_CHOICES = ['報價單', '回簽單', '設計圖', '刀模', '其他']; // 徽章可手動改成的值(另含「清除」)

  function isUpload(f) { return String(f.source || '').toLowerCase() === 'upload'; }
  function normDocRole(r) { const s = String(r == null ? '' : r).trim(); return s; }

  // 依 mimeType + 副檔名分類
  function classifyFile(f) {
    const name = String(f.fileName || '').toLowerCase();
    const mime = String(f.mimeType || '').toLowerCase();
    const ext = name.indexOf('.') >= 0 ? name.slice(name.lastIndexOf('.') + 1) : '';
    if (mime.indexOf('image/') === 0 || ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp', 'svg', 'heic'].indexOf(ext) >= 0) return 'image';
    if (mime === 'application/pdf' || ext === 'pdf') return 'pdf';
    if (['ai', 'psd', 'eps', 'cdr', 'sketch', 'indd'].indexOf(ext) >= 0 || mime.indexOf('postscript') >= 0 || mime.indexOf('illustrator') >= 0) return 'design';
    if (['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'csv', 'txt', 'odt'].indexOf(ext) >= 0) return 'doc';
    return 'other';
  }
  function fileUrl(f) {
    return fileLinkByHash[f.contentHash] || (f.downloadUrl || (f.id != null ? '/api/files/' + f.id + '/download' : '#'));
  }

  async function loadFiles() {
    const box = $('files-body');
    box.innerHTML = UI.loadingHtml();
    let files = [], missing = [];
    try {
      const data = await API.get(api + '/files');
      files = (data && data.files) || [];
      missing = (data && data.missing) || []; // messages 有 contentHash 但無實體(LINE 已無法提供)
    } catch (e) {
      box.innerHTML = UI.errorHtml('檔案載入失敗:' + e.message);
      return;
    }
    // 建 contentHash → downloadUrl 對照(對話中的檔案訊息用)
    files.forEach(function (f) {
      const url = f.downloadUrl || (f.id != null ? '/api/files/' + f.id + '/download' : null);
      if (f.contentHash && url) fileLinkByHash[f.contentHash] = url;
    });
    files.sort(function (a, b) {
      return (b.uploadedAt || b.downloadedAt || 0) - (a.uploadedAt || a.downloadedAt || 0);
    });
    files.forEach(function (f) { f._cat = classifyFile(f); f.docRole = normDocRole(f.docRole); });
    // 缺檔占位:視為 LINE 來源的虛擬檔——可依副檔名分類、依 docRole 歸類,但無實體、不可下載/拖曳
    missingFiles = (missing || []).map(function (m) {
      return {
        _missing: true, source: 'line',
        lineMessageId: m.lineMessageId,
        fileName: m.fileName || '',
        fileSize: m.fileSize,
        docRole: normDocRole(m.docRole),
        timestamp: m.timestamp,
        direction: m.direction,
        _cat: classifyFile({ fileName: m.fileName, mimeType: '' })
      };
    });
    missingFiles.sort(function (a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
    allFiles = files;
    $('file-count').textContent = files.length ? '(' + files.length + ')' : '';
    renderFileLibrary();
  }

  function unionFiles() { return allFiles.concat(missingFiles); }

  // 目前篩選是否命中:'all' 全部;'role:X' 依 docRole;其餘依檔案類型 _cat
  function matchesTab(f) {
    if (fileTab === 'all') return true;
    if (fileTab.indexOf('role:') === 0) return f.docRole === fileTab.slice(5);
    return f._cat === fileTab;
  }

  function renderFileLibrary() {
    const box = $('files-body');
    const union = unionFiles();
    // ---- 分類標籤:檔案類型(cat)+ docRole(有該類才顯示),同列且作用於兩區 ----
    const counts = { all: union.length };
    union.forEach(function (f) { counts[f._cat] = (counts[f._cat] || 0) + 1; });
    const roleCounts = {};
    union.forEach(function (f) { if (f.docRole) roleCounts[f.docRole] = (roleCounts[f.docRole] || 0) + 1; });

    let tabs = '<div class="file-tabs">';
    CAT_ORDER.forEach(function (c) {
      if (c !== 'all' && !counts[c]) return;
      tabs += '<button type="button" class="file-tab' + (fileTab === c ? ' active' : '') +
        '" data-cat="' + c + '">' + CAT_LABEL[c] + ' ' + (counts[c] || 0) + '</button>';
    });
    DOCROLE_ORDER.forEach(function (r) {
      if (!roleCounts[r]) return;
      const key = 'role:' + r;
      tabs += '<button type="button" class="file-tab role-tab ' + (DOCROLE_CLASS[r] || '') +
        (fileTab === key ? ' active' : '') + '" data-role="' + UI.esc(r) + '">' +
        UI.esc(r) + ' ' + roleCounts[r] + '</button>';
    });
    tabs += '</div>';

    // 兩區一律顯示(即使全空):讓同事知道可上傳;各區自帶小字空狀態
    // ---- 兩區:LINE 下載(source!='upload' + 缺檔占位)/ 工作台上傳(source='upload') ----
    const lineItems = union.filter(function (f) { return !isUpload(f) && matchesTab(f); });
    const uploadItems = allFiles.filter(function (f) { return isUpload(f) && matchesTab(f); });
    const lineTotal = allFiles.filter(function (f) { return !isUpload(f); }).length + missingFiles.length;
    const uploadTotal = allFiles.filter(isUpload).length;

    let html = tabs;
    html += renderRegion('📥 LINE 下載', lineTotal, lineItems, '');
    html += renderRegion('🖥 工作台上傳', uploadTotal, uploadItems,
      '<button type="button" class="btn small primary file-upload-trigger">⬆ 上傳檔案</button>');
    box.innerHTML = html;
  }

  function renderRegion(title, total, items, headExtraHtml) {
    let h = '<div class="file-region">';
    h += '<div class="file-region-head"><span class="file-region-title">' + UI.esc(title) +
      ' <span class="file-region-count">' + total + '</span></span>' + (headExtraHtml || '') + '</div>';
    if (items.length === 0) {
      h += '<div class="file-region-empty">' + (total === 0 ? '此區尚無檔案' : '此分類無檔案') + '</div>';
    } else {
      h += '<div class="file-grid">' + items.map(function (f) {
        return f._missing ? renderMissingCard(f) : renderFileCard(f);
      }).join('') + '</div>';
    }
    return h + '</div>';
  }

  // docRole 徽章:報價單金色、回簽單綠色;實體檔可點擊修改,占位卡僅顯示
  function docRoleBadgeHtml(f) {
    const editable = f.id != null && !f._missing;
    if (f.docRole) {
      const cls = DOCROLE_CLASS[f.docRole] || 'dr-other';
      return '<span class="badge docrole ' + cls + (editable ? ' fc-role-badge' : '') + '"' +
        (editable ? ' data-file-id="' + UI.esc(String(f.id)) + '" data-role="' + UI.esc(f.docRole) +
          '" title="點擊修改文件分類"' : '') + '>' + UI.esc(f.docRole) + '</span>';
    }
    if (editable) {
      return '<span class="badge docrole dr-add fc-role-badge" data-file-id="' + UI.esc(String(f.id)) +
        '" data-role="" title="設定文件分類">＋ 分類</span>';
    }
    return '';
  }

  function renderFileCard(f) {
    const url = fileUrl(f);
    const sizeStr = UI.fmtSize(f.fileSize);
    const srcBadge = isUpload(f)
      ? '<span class="badge file-src src-upload" title="同事上傳">內部上傳' + (f.uploaderName ? '·' + UI.esc(f.uploaderName) : '') + '</span>'
      : '<span class="badge file-src src-line" title="來自 LINE">LINE</span>';
    let preview, action;
    if (f._cat === 'image') {
      preview = '<img class="fc-thumb" src="' + UI.esc(url) + '" alt="圖片" loading="lazy" decoding="async" data-full="' + UI.esc(url) + '" data-name="' + UI.esc(f.fileName || '') + '" onerror="this.classList.add(\'thumb-fail\')">';
      action = '<button type="button" class="btn small block fc-open" data-full="' + UI.esc(url) + '" data-name="' + UI.esc(f.fileName || '') + '">預覽</button>';
    } else {
      const icon = f._cat === 'pdf' ? '📕' : f._cat === 'design' ? '🎨' : f._cat === 'doc' ? '📄' : '📎';
      preview = '<div class="fc-icon" data-cat="' + f._cat + '">' + icon + '</div>';
      if (f._cat === 'pdf') {
        action = '<a class="btn small block" href="' + UI.esc(url) + '?inline=1" target="_blank" rel="noopener">開啟預覽</a>';
      } else {
        action = '<a class="btn small block" href="' + UI.esc(url) + '">下載</a>';
      }
    }
    const displayName = f._cat === 'image' ? niceImgName(f.fileName) : (f.fileName || '(未命名)');
    return '<div class="file-card fc-' + f._cat + '" draggable="true" data-file-id="' + UI.esc(String(f.id != null ? f.id : '')) +
      '" data-file-name="' + UI.esc(displayName) + '">' +
      '<div class="file-src-row">' + srcBadge + docRoleBadgeHtml(f) + '</div>' +
      preview +
      '<div class="fname" title="' + UI.esc(f.fileName || '') + '">' + UI.esc(displayName) + '</div>' +
      '<div class="fmeta">' + (sizeStr ? UI.esc(sizeStr) + ' · ' : '') + UI.esc(UI.fmtDate(f.uploadedAt || f.downloadedAt)) + '</div>' +
      action + '</div>';
  }

  // 缺檔補件占位卡:檔名 + docRole 徽章 + ⚠️ LINE 已無法提供 + ⬆ 上傳補件
  function renderMissingCard(m) {
    const sizeStr = UI.fmtSize(m.fileSize);
    const icon = m._cat === 'pdf' ? '📕' : m._cat === 'image' ? '🖼' : m._cat === 'design' ? '🎨' : m._cat === 'doc' ? '📄' : '📎';
    return '<div class="file-card missing fc-' + m._cat + '">' +
      '<div class="file-src-row"><span class="badge file-src src-line" title="來自 LINE">LINE</span>' + docRoleBadgeHtml(m) + '</div>' +
      '<div class="fc-icon fc-missing-icon">' + icon + '</div>' +
      '<div class="fname" title="' + UI.esc(m.fileName || '') + '">' + UI.esc(m.fileName || '(未命名檔案)') + '</div>' +
      '<div class="fmeta">' + (sizeStr ? UI.esc(sizeStr) + ' · ' : '') + UI.esc(UI.fmtDate(m.timestamp)) + '</div>' +
      '<div class="fc-missing-note">⚠️ LINE 已無法提供</div>' +
      '<button type="button" class="btn small block fc-supplement" data-msgid="' + UI.esc(String(m.lineMessageId == null ? '' : m.lineMessageId)) + '">⬆ 上傳補件</button>' +
      '</div>';
  }

  // 檔案牆互動:上傳按鈕 / 補件 / docRole 徽章 / 分類切換 / 圖片燈箱
  $('files-body').addEventListener('click', function (e) {
    const up = e.target.closest('.file-upload-trigger');
    if (up) { $('file-upload-input').click(); return; }
    const sup = e.target.closest('.fc-supplement');
    if (sup) { startSupplement(sup.getAttribute('data-msgid')); return; }
    const roleBadge = e.target.closest('.fc-role-badge');
    if (roleBadge) { openDocRoleMenu(roleBadge); return; }
    const tab = e.target.closest('.file-tab');
    if (tab) {
      fileTab = tab.hasAttribute('data-role') ? ('role:' + tab.getAttribute('data-role')) : tab.getAttribute('data-cat');
      renderFileLibrary();
      return;
    }
    const img = e.target.closest('.fc-thumb, .fc-open');
    if (img) { openLightbox(img.getAttribute('data-full'), img.getAttribute('data-name')); }
  });

  // ---- docRole 手動修改浮動選單(PUT /api/customers/:chatId/files/:id/docRole) ----
  let docRoleMenuEl = null;
  function closeDocRoleMenu() {
    if (docRoleMenuEl) { docRoleMenuEl.remove(); docRoleMenuEl = null; }
    document.removeEventListener('click', onDocRoleOutside, true);
    document.removeEventListener('keydown', onDocRoleKey, true);
  }
  function onDocRoleOutside(e) {
    if (docRoleMenuEl && !docRoleMenuEl.contains(e.target) && !e.target.closest('.fc-role-badge')) closeDocRoleMenu();
  }
  function onDocRoleKey(e) { if (e.key === 'Escape') closeDocRoleMenu(); }

  function openDocRoleMenu(badge) {
    closeDocRoleMenu();
    const fileId = badge.getAttribute('data-file-id');
    if (!fileId) return;
    const cur = badge.getAttribute('data-role') || '';
    const menu = document.createElement('div');
    menu.className = 'docrole-menu';
    let html = '<div class="docrole-menu-title">文件分類</div>';
    DOCROLE_CHOICES.forEach(function (r) {
      html += '<button type="button" class="docrole-opt' + (r === cur ? ' sel' : '') +
        '" data-role="' + UI.esc(r) + '"><span class="badge docrole ' + (DOCROLE_CLASS[r] || 'dr-other') + '">' +
        UI.esc(r) + '</span></button>';
    });
    if (cur) html += '<button type="button" class="docrole-opt docrole-clear" data-role="">清除分類</button>';
    menu.innerHTML = html;
    document.body.appendChild(menu);
    // 定位於徽章下方(position:fixed,用視窗座標),避免超出右緣
    const rect = badge.getBoundingClientRect();
    const mw = 172;
    const maxLeft = document.documentElement.clientWidth - mw - 8;
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.left = Math.max(8, Math.min(rect.left, maxLeft)) + 'px';
    docRoleMenuEl = menu;
    menu.addEventListener('click', function (ev) {
      const opt = ev.target.closest('.docrole-opt');
      if (!opt) return;
      applyDocRole(fileId, opt.getAttribute('data-role'));
    });
    // 延後掛外部關閉監聽,免得觸發本次點擊立即關閉
    setTimeout(function () {
      document.addEventListener('click', onDocRoleOutside, true);
      document.addEventListener('keydown', onDocRoleKey, true);
    }, 0);
  }

  async function applyDocRole(fileId, role) {
    closeDocRoleMenu();
    try {
      await API.put(
        '/api/customers/' + encodeURIComponent(chatId) + '/files/' + encodeURIComponent(fileId) + '/docRole',
        { docRole: role ? role : null }
      );
      await loadFiles();
      refreshAuditIfOpen();
    } catch (e) {
      alert('修改文件分類失敗:' + e.message);
    }
  }

  // ---- 燈箱(圖片全屏預覽,可左右切換同類圖片,Esc/點背景關閉) ----
  let lightboxImgs = [];
  let lightboxIdx = 0;
  function ensureLightbox() {
    let lb = $('lightbox');
    if (lb) return lb;
    lb = document.createElement('div');
    lb.id = 'lightbox';
    lb.className = 'lightbox';
    lb.hidden = true;
    lb.innerHTML =
      '<button type="button" class="lb-close" title="關閉">✕</button>' +
      '<button type="button" class="lb-prev" title="上一張">‹</button>' +
      '<img class="lb-img" alt="">' +
      '<button type="button" class="lb-next" title="下一張">›</button>' +
      '<div class="lb-name"></div>';
    document.body.appendChild(lb);
    lb.querySelector('.lb-close').addEventListener('click', closeLightbox);
    lb.querySelector('.lb-prev').addEventListener('click', function (ev) { ev.stopPropagation(); stepLightbox(-1); });
    lb.querySelector('.lb-next').addEventListener('click', function (ev) { ev.stopPropagation(); stepLightbox(1); });
    lb.addEventListener('click', function (ev) { if (ev.target === lb) closeLightbox(); });
    document.addEventListener('keydown', function (ev) {
      if ($('lightbox').hidden) return;
      if (ev.key === 'Escape') closeLightbox();
      else if (ev.key === 'ArrowLeft') stepLightbox(-1);
      else if (ev.key === 'ArrowRight') stepLightbox(1);
    });
    return lb;
  }
  function openLightbox(url, name) {
    ensureLightbox();
    // 收集目前篩選下(兩區合併)的所有實體圖片,供左右切換;占位卡無實體不納入
    lightboxImgs = allFiles.filter(function (f) { return f._cat === 'image' && matchesTab(f); })
      .map(function (f) { return { url: fileUrl(f), name: f.fileName || '' }; });
    lightboxIdx = Math.max(0, lightboxImgs.findIndex(function (x) { return x.url === url; }));
    if (lightboxImgs.length === 0) lightboxImgs = [{ url: url, name: name || '' }];
    showLightbox();
  }
  // LINE 圖片無友善檔名(存的是 contentHash),顯示「圖片」而非一長串亂碼
  function niceImgName(name) {
    const n = String(name || '');
    if (!n) return '圖片';
    // 無副檔名且過長(hash/base64 樣式)→ 視為無名
    if (n.length > 40 && n.indexOf('.') < 0) return '圖片';
    return n;
  }
  function showLightbox() {
    const lb = $('lightbox');
    const cur = lightboxImgs[lightboxIdx] || { url: '', name: '' };
    lb.querySelector('.lb-img').src = cur.url;
    lb.querySelector('.lb-name').textContent = niceImgName(cur.name) + (lightboxImgs.length > 1 ? '  (' + (lightboxIdx + 1) + '/' + lightboxImgs.length + ')' : '');
    lb.querySelector('.lb-prev').style.visibility = lightboxImgs.length > 1 ? 'visible' : 'hidden';
    lb.querySelector('.lb-next').style.visibility = lightboxImgs.length > 1 ? 'visible' : 'hidden';
    lb.hidden = false;
  }
  function stepLightbox(d) {
    if (lightboxImgs.length < 2) return;
    lightboxIdx = (lightboxIdx + d + lightboxImgs.length) % lightboxImgs.length;
    showLightbox();
  }
  function closeLightbox() { const lb = $('lightbox'); if (lb) lb.hidden = true; }

  // ================= 建檔(按需完整同步) =================
  // POST full-sync → pending;每 10 秒輪詢 GET full-sync;變 done 時刷新各區塊並提示。
  let syncPollTimer = null;
  let lastSyncStatus = null;

  function renderSyncUi(st) {
    const status = (st && st.status) || 'none';
    $('sync-badge').innerHTML = UI.syncBadge(status);
    const btn = $('full-sync-btn');
    btn.hidden = false;
    if (status === 'pending') {
      btn.disabled = true;
      btn.textContent = '建檔中…';
    } else {
      btn.disabled = false;
      btn.textContent = status === 'error' ? '🔄 重試'
        : (status === 'done' ? '🔄 重新建檔' : '🔄 建檔');
    }
    const errBox = $('sync-error');
    if (status === 'error' && st && st.error) {
      errBox.hidden = false;
      errBox.textContent = '建檔失敗:' + st.error;
      errBox.title = String(st.error);
    } else if (status === 'pending' && st && st.error) {
      // 依契約:插件單次失敗會留 pending 並記 error,下輪自動重試
      errBox.hidden = false;
      errBox.textContent = '上次嘗試失敗,將自動重試:' + st.error;
      errBox.title = String(st.error);
    } else {
      errBox.hidden = true;
      errBox.textContent = '';
      errBox.removeAttribute('title');
    }
  }

  async function loadSyncStatus() {
    if (document.visibilityState === 'hidden') return; // 背景分頁暫停,回前景由 visibilitychange 補拉(與 team/bell 一致)
    let st;
    try {
      st = await API.getFullSync(chatId);
    } catch (e) {
      return; // 查詢失敗不影響其他區塊,維持目前顯示,下次輪詢再試
    }
    const status = (st && st.status) || 'none';
    const prev = lastSyncStatus;
    lastSyncStatus = status;
    renderSyncUi(st);
    if (status === 'pending') startSyncPolling();
    else stopSyncPolling();
    if (prev === 'pending' && status === 'done') {
      showToast('建檔完成');
      refreshAfterSync();
      // 後端是「先標 done、再非同步調 LLM 生成總結」(需數秒到數十秒),
      // 上面的刷新幾乎必然搶在總結落庫之前:再對 summaries 做短期輪詢,
      // 直到出現 createdAt >= completedAt 的新總結(或逾時),
      // 契約「建檔完成後詳情頁自動出現總結」才不需手動刷新頁面。
      watchForNewSummary((st && st.completedAt) || Date.now());
    }
  }

  // ---- 建檔完成後等待自動總結落庫(每 5 秒查一次,最多 90 秒) ----
  // 出現 createdAt >= completedAt 的新總結即 renderSummary + loadProgress(灯號/階段同步),不需手動刷新。
  let summaryWatchTimer = null;
  function watchForNewSummary(sinceTs) {
    if (summaryWatchTimer) clearInterval(summaryWatchTimer);
    let tries = 0;
    summaryWatchTimer = setInterval(async function () {
      if (document.visibilityState === 'hidden') return; // 背景分頁暫停(不計次數),回前景繼續等待
      tries++;
      if (tries > 18) { // 逾時 90 秒:LLM 未配置或生成失敗,交由使用者手動「重新生成總結」
        clearInterval(summaryWatchTimer);
        summaryWatchTimer = null;
        return;
      }
      try {
        // 建檔是整體(orderId 0)操作,固定觀察整體總結
        const data = await API.getSummariesFor(chatId, 0);
        const list = (data && data.summaries) || [];
        list.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
        if (list.length > 0 && (list[0].createdAt || 0) >= sinceTs) {
          clearInterval(summaryWatchTimer);
          summaryWatchTimer = null;
          loadCustomer();  // 階段徽章可能被自動總結更新
          // 若使用者停留在整體視圖才刷新總結/進度面板;切到某訂單時不覆蓋其面板
          if (currentOrderId === 0) {
            renderSummary(list[0]);
            loadProgress();  // 自動總結會重跑 taskStatus + currentStage → 刷新進度面板紅綠燈與死線
          }
        }
      } catch (e) {
        // 查詢失敗不中斷輪詢,下次再試
      }
    }, 5000);
  }

  function startSyncPolling() {
    if (syncPollTimer) return;
    syncPollTimer = setInterval(loadSyncStatus, 10000);
  }
  function stopSyncPolling() {
    if (syncPollTimer) { clearInterval(syncPollTimer); syncPollTimer = null; }
  }
  // 回到前景時補拉一次建檔狀態(背景分頁時輪詢已暫停,與 team/bell 一致)
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') loadSyncStatus();
  });

  /** 建檔完成 → 刷新總結 / 訊息 / 檔案 / 資訊 / 記事本 */
  function refreshAfterSync() {
    loadCustomer();
    loadNotes();
    loadSummary();
    // 先載檔案(重建 hash→連結對照)再重載訊息
    loadFiles().then(function () { return loadMessages(null); });
  }

  $('full-sync-btn').addEventListener('click', async function () {
    const btn = this;
    btn.disabled = true;
    try {
      await API.requestFullSync(chatId);
    } catch (e) {
      btn.disabled = false;
      const errBox = $('sync-error');
      errBox.hidden = false;
      errBox.textContent = '建檔請求送出失敗:' + e.message;
      return;
    }
    lastSyncStatus = 'pending';
    renderSyncUi({ status: 'pending' });
    startSyncPolling();
  });

  // ================= 中欄:內部討論(客戶不可見) =================
  // 每 10 秒 after= 增量輪詢;頁面隱藏(document.visibilityState)時暫停,回前景立即補拉。
  const teamScroll = $('team-scroll');
  let teamAfter = 0;        // 增量游標:GET 已取回的最大 id(只由 GET 推進,見 sendTeamMessage 註解)
  const teamSeen = {};      // id → true:POST 回應先行插入,GET 再回同一筆時去重
  let teamPolling = false;  // 防輪詢重疊
  let teamInited = false;   // 首次載入(成功前顯示載入/錯誤狀態,失敗由下次輪詢重試)

  function teamNearBottom() {
    return teamScroll.scrollHeight - teamScroll.scrollTop - teamScroll.clientHeight < 48;
  }
  function teamScrollToBottom() { teamScroll.scrollTop = teamScroll.scrollHeight; }

  function renderTeamMsg(m) {
    const me = API.getUser();
    const own = !!(me && m.authorName === me.name && m.authorRole === me.role);
    const el = document.createElement('div');
    el.className = 'team-msg' + (own ? ' own' : '');
    el.dataset.id = m.id != null ? String(m.id) : '';
    el.dataset.name = m.authorName || '';
    el.dataset.role = m.authorRole || '';
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = UI.roleBadge(m.authorRole) +
      '<span class="name">' + UI.esc(m.authorName || '') + '</span>' +
      '<span class="time" title="' + UI.esc(UI.fmtDateTime(m.createdAt)) + '">' +
      UI.esc(UI.relTime(m.createdAt)) + '</span>';
    const body = document.createElement('div');
    body.className = 'body';
    // XSS:body 純文字經 renderBodyWithMentions 全程 textContent/createElement,絕不進 innerHTML
    renderBodyWithMentions(body, m.body || '', m.mentions);
    el.appendChild(meta);
    el.appendChild(body);
    return el;
  }

  /** 依 id 升序插入(去重);幾乎都是附加到底部,僅 GET 補回更早訊息時往前插 */
  function insertTeamMsg(m) {
    if (!m || m.id == null || teamSeen[m.id]) return false;
    teamSeen[m.id] = true;
    const empty = teamScroll.querySelector('.team-empty');
    if (empty) empty.remove();
    const el = renderTeamMsg(m);
    let ref = null;
    for (let i = teamScroll.children.length - 1; i >= 0; i--) {
      const cid = Number(teamScroll.children[i].dataset.id);
      if (!isNaN(cid) && cid > Number(m.id)) ref = teamScroll.children[i];
      else break;
    }
    teamScroll.insertBefore(el, ref); // ref 為 null 時等同 append
    return true;
  }

  async function pollTeamMessages(force) {
    if (teamPolling) return;
    if (!force && document.visibilityState === 'hidden') return; // 頁面隱藏時暫停
    teamPolling = true;
    try {
      const data = await API.getTeamMessages(chatId, teamAfter);
      const msgs = (data && data.messages) || [];
      const first = !teamInited;
      if (first) {
        teamInited = true;
        // 清空 DOM 的同時重置去重表:首次 GET 成功前可能已 POST 上屏(teamSeen 已標記),
        // 不重置的話該筆會被清掉又被去重擋住、永久消失;此時 teamAfter 仍為 0,本輪會完整補回
        teamScroll.innerHTML = '';
        Object.keys(teamSeen).forEach(function (k) { delete teamSeen[k]; });
      }
      if (msgs.length > 0) {
        const stick = first || teamNearBottom();
        let added = false;
        msgs.forEach(function (m) {
          if (m && m.id != null && Number(m.id) > teamAfter) teamAfter = Number(m.id);
          if (insertTeamMsg(m)) added = true;
        });
        if (added && stick) teamScrollToBottom();
      }
      if (teamScroll.children.length === 0) {
        teamScroll.innerHTML = '<div class="team-empty">尚無內部討論,輸入第一則訊息吧</div>';
      }
    } catch (e) {
      if (!teamInited) {
        // 首次載入失敗:顯示錯誤,teamInited 維持 false,下次輪詢自動重試
        teamScroll.innerHTML = UI.errorHtml('內部討論載入失敗:' + e.message);
      }
      // 已載入後的輪詢失敗保持靜默,下次輪詢再試(與建檔輪詢一致)
    } finally {
      teamPolling = false;
    }
  }

  async function sendTeamMessage() {
    const ta = $('team-input');
    const body = ta.value.trim();
    if (!body) return; // 契約:去空白後不得為空
    const btn = $('team-send-btn');
    btn.disabled = true;
    ta.disabled = true;
    try {
      // 發言人身分由後端依 session 強制覆蓋,前端只送 body + 結構化 mentions。
      // 只保留仍出現在 body 內的 @提及(使用者可能已刪掉插入的名字),並去重。
      const mentions = collectMentions(body);
      const payload = { body: body };
      if (mentions.length) payload.mentions = mentions;
      const data = await API.postTeamMessage(chatId, payload);
      ta.value = '';
      pendingMentions = [];
      hideMentionBox();
      if (data && data.message) {
        // 立即上屏;故意不推進 teamAfter 游標——若別人在同一輪詢間隔內發了
        // 更小 id 的訊息,游標跳過去會永久漏訊,交由下次 GET 補齊 + teamSeen 去重
        insertTeamMsg(data.message);
        teamScrollToBottom();
      } else {
        pollTeamMessages(true);
      }
      $('team-err').hidden = true;
      $('team-err').textContent = '';
    } catch (e) {
      const errBox = $('team-err');
      errBox.hidden = false;
      errBox.textContent = '送出失敗:' + e.message;
    } finally {
      btn.disabled = false;
      ta.disabled = false;
      ta.focus();
    }
  }

  $('team-send-btn').addEventListener('click', sendTeamMessage);
  $('team-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      if (e.isComposing || e.keyCode === 229) return; // 輸入法選字中的 Enter 不送出
      e.preventDefault();
      sendTeamMessage();
    }
  });

  setInterval(function () { pollTeamMessages(false); }, 10000);
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') pollTeamMessages(false);
  });

  // ---- toast 提示 ----
  let toastTimer = null;
  function showToast(text) {
    let el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 4000);
  }

  // ================= 小工具(進度/提及共用) =================
  function cssEsc(s) {
    if (window.CSS && CSS.escape) return CSS.escape(String(s));
    return String(s).replace(/["\\\]]/g, '\\$&');
  }
  function msToDateInput(ms) {
    if (!ms) return '';
    const d = new Date(Number(ms));
    if (isNaN(d.getTime())) return '';
    return d.getFullYear() + '-' + UI.pad2(d.getMonth() + 1) + '-' + UI.pad2(d.getDate());
  }
  function dateInputToMs(str) {
    if (!str) return null;
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(str);
    if (!m) return null;
    const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    return isNaN(d.getTime()) ? null : d.getTime();
  }

  // ================= 進度面板 =================
  const STAGE_FLOW = ['洽談', '已回簽', '已打樣', '已出廠', '已交付'];
  let progressData = null;
  const expandedStages = {};   // stage → true(展開)
  const metaTextDebounce = {}; // 物流文字欄位各自 debounce

  // 階段鎖定下拉(選項固定,只在此建一次)
  (function initOverrideSelect() {
    const sel = $('stage-override');
    const opts = [{ v: '', t: '自動(依任務)' }].concat(
      STAGE_FLOW.map(function (s) { return { v: s, t: s }; })
    );
    sel.innerHTML = opts.map(function (o) {
      return '<option value="' + UI.esc(o.v) + '">' + UI.esc(o.t) + '</option>';
    }).join('');
    sel.addEventListener('change', async function () {
      const val = sel.value;
      sel.disabled = true;
      try {
        const data = await API.putMetaFor(chatId, currentOrderId, { stageOverride: val });
        if (data && data.progress) {
          progressData = data.progress;
          renderStageOverrideState(data.progress);
          renderProgress(data.progress);
        } else {
          await loadProgress();
        }
        loadCustomer();       // 階段徽章同步
        refreshAuditIfOpen();
      } catch (e) {
        alert('階段鎖定失敗:' + e.message);
        renderStageOverrideState(progressData);
      } finally {
        sel.disabled = false;
      }
    });
  })();

  async function loadProgress() {
    const seq = orderReqSeq; // 捕獲當下範圍序號;回應到達時序號已變(切換訂單)則捨棄
    let p;
    try {
      p = await API.getProgressFor(chatId, currentOrderId);
    } catch (e) {
      if (seq !== orderReqSeq) return; // 已切換訂單,捨棄過期錯誤
      $('progress-card').hidden = false;
      $('progress-body').innerHTML = UI.errorHtml('進度載入失敗:' + e.message);
      return;
    }
    if (seq !== orderReqSeq) return; // 已切換訂單,捨棄過期結果(勿蓋掉新訂單的進度/死線橫幅)
    progressData = p;
    if (Object.keys(expandedStages).length === 0 && p.currentStage) {
      expandedStages[p.currentStage] = true; // 首次預設展開當前階段
    }
    $('progress-card').hidden = false;
    renderStageOverrideState(p);
    renderProgress(p);
    // 大貨死線橫幅:總結面板最上方也顯示一份(進度面板頂部由 renderProgress 內含)
    $('summary-deadline').innerHTML = deadlineBannerHtml(p);
  }

  // 大貨死線橫幅:醒目倒數 / 逾期警示;無死線顯示「設定」。點擊「設定/修改」→ 選日期
  function deadlineBannerHtml(p) {
    const d = (p && p.deadline) || {};
    if (d.at) {
      const dl = d.daysLeft;
      let cls = 'dl-ok', tag;
      if (dl < 0) { cls = 'dl-over'; tag = '已逾期 ' + Math.abs(dl) + ' 天'; }
      else if (dl === 0) { cls = 'dl-today'; tag = '今天到期!'; }
      else if (dl <= 7) { cls = 'dl-soon'; tag = '剩 ' + dl + ' 天'; }
      else { tag = '剩 ' + dl + ' 天'; }
      const src = d.source === 'manual' ? '人工' : 'AI';
      return '<div class="deadline-banner ' + cls + '">' +
        '<span class="dl-ico">⏰</span>' +
        '<span class="dl-main">大貨死線 ' + UI.esc(UI.fmtDate(d.at)) + '</span>' +
        '<span class="dl-tag">' + UI.esc(tag) + '</span>' +
        '<button type="button" class="dl-edit" title="修改死線(' + src + '設定)">✎</button>' +
        (d.evidence ? '<div class="dl-evi">🔍 ' + UI.esc(d.evidence) + '</div>' : '') +
        '</div>';
    }
    return '<div class="deadline-banner dl-none">' +
      '<span class="dl-ico">⏰</span>' +
      '<span class="dl-main">尚未設定大貨死線</span>' +
      '<button type="button" class="dl-edit primary">設定死線</button>' +
      '</div>';
  }

  // 死線橫幅「設定/修改」點擊(委派到 document,涵蓋總結面板與進度面板兩處)
  document.addEventListener('click', function (e) {
    const btn = e.target.closest('.dl-edit');
    if (!btn) return;
    setDeadlinePrompt();
  });
  async function setDeadlinePrompt() {
    const cur = progressData && progressData.deadline && progressData.deadline.at
      ? msToDateInput(progressData.deadline.at) : '';
    const input = window.prompt('輸入大貨交期死線(格式 YYYY-MM-DD,例 2026-08-15)。清空則移除:', cur);
    if (input === null) return;
    const trimmed = input.trim();
    let deadlineAt = null;
    if (trimmed) {
      const ms = dateInputToMs(trimmed);
      if (!ms) { alert('日期格式不正確,請用 YYYY-MM-DD'); return; }
      deadlineAt = ms;
    }
    try {
      const data = await API.putMetaFor(chatId, currentOrderId, { deadlineAt: deadlineAt });
      if (data && data.progress) { progressData = data.progress; loadProgress(); }
      refreshAuditIfOpen();
    } catch (e) { alert('設定死線失敗:' + e.message); }
  }

  function renderStageOverrideState(p) {
    const sel = $('stage-override');
    if (!sel || !p) return;
    sel.value = p.stageOverride || '';
    sel.classList.toggle('locked', !!p.stageOverride);
  }

  function renderProgress(p) {
    const body = $('progress-body');
    const stages = (p.stages && p.stages.length)
      ? p.stages
      : STAGE_FLOW.map(function (s) { return { stage: s, tasks: [] }; });
    const curIdx = STAGE_FLOW.indexOf(p.currentStage);

    // 大貨死線橫幅(貫穿進度:置於步驟條上方)
    let step = deadlineBannerHtml(p);
    // 步驟條
    step += '<div class="stepper">';
    STAGE_FLOW.forEach(function (s, i) {
      let cls = 'step';
      if (curIdx >= 0 && i < curIdx) cls += ' done';
      else if (i === curIdx) cls += ' current';
      step += '<button type="button" class="' + cls + '" data-stagestep="' + UI.esc(s) + '">' +
        '<span class="step-idx">' + (i + 1) + '</span>' +
        '<span class="step-name">' + UI.esc(s) + '</span></button>';
      if (i < STAGE_FLOW.length - 1) {
        step += '<span class="step-line' + (curIdx >= 0 && i < curIdx ? ' done' : '') + '"></span>';
      }
    });
    step += '</div>';
    if (p.stageOverride) {
      step += '<div class="stage-lock-note">🔒 已手動鎖定為「' + UI.esc(p.stageOverride) +
        '」,不隨任務自動推進</div>';
    }

    // 手風琴:每階段任務 + 參數
    let acc = '<div class="stage-acc">';
    stages.forEach(function (st) {
      const stage = st.stage;
      const open = !!expandedStages[stage];
      const tasks = st.tasks || [];
      const doneCount = tasks.filter(function (t) { return t.done; }).length;
      acc += '<div class="stage-block' + (stage === p.currentStage ? ' is-current' : '') +
        '" data-stage="' + UI.esc(stage) + '">';
      acc += '<button type="button" class="stage-block-head" data-toggle="' + UI.esc(stage) +
        '" aria-expanded="' + open + '">' +
        '<span class="chev">' + (open ? '▾' : '▸') + '</span>' +
        '<span class="stage-block-name">' + UI.esc(stage) + '</span>' +
        '<span class="stage-block-count">' + doneCount + '/' + tasks.length + '</span></button>';
      acc += '<div class="stage-block-body"' + (open ? '' : ' hidden') + '>';
      acc += renderTaskList(tasks);
      acc += renderStageParams(stage, p);
      acc += '</div></div>';
    });
    acc += '</div>';
    body.innerHTML = step + acc;
  }

  function renderTaskList(tasks) {
    if (!tasks.length) return '<div class="task-empty">此階段無任務</div>';
    return '<div class="task-list">' + tasks.map(function (t) {
      const done = !!t.done;
      const manual = t.source === 'manual';
      const evi = t.evidence || '';
      return '<div class="task-row-wrap">' +
        '<div class="task-row">' +
        '<button type="button" class="task-light ' + (done ? 'on' : 'off') + '" ' +
        'data-task="' + UI.esc(t.taskKey) + '" data-done="' + (done ? '1' : '0') + '" ' +
        'title="' + (done ? '已完成,點擊改為未完成' : '未完成,點擊標記完成') + '">' +
        (done ? '🟢' : '🔴') + '</button>' +
        '<span class="task-label">' + UI.esc(t.label) + '</span>' +
        (manual ? '<span class="task-src">手動</span>' : '') +
        '<button type="button" class="task-evi-edit" data-task="' + UI.esc(t.taskKey) + '" ' +
        'data-done="' + (done ? '1' : '0') + '" data-evi="' + UI.esc(evi) + '" ' +
        'title="補充/修改證據">✎</button>' +
        '</div>' +
        (evi ? '<div class="task-evi-line">🔍 證據:' + UI.esc(evi) + '</div>' : '') +
        '</div>';
    }).join('') + '</div>';
  }

  function renderStageParams(stage, p) {
    const meta = p.meta || {};
    const exp = p.expected || {};
    if (stage === '已回簽') {
      return paramLeadBlock('打樣天數', 'sampleLeadDays', meta.sampleLeadDays,
        'sampleStartAt', meta.sampleStartAt, exp.sampleDueAt);
    }
    if (stage === '已打樣') {
      return paramLeadBlock('生產天數', 'productionLeadDays', meta.productionLeadDays,
        'productionStartAt', meta.productionStartAt, exp.productionDueAt);
    }
    if (stage === '已出廠') {
      return '<div class="stage-params logistics">' +
        logisticsRow('物流商', 'logisticsProvider', meta.logisticsProvider, '例:順豐 / 貨運行') +
        logisticsRow('物流單號', 'logisticsTrackingNo', meta.logisticsTrackingNo, '追蹤號 / 報關單號') +
        logisticsRow('備註', 'logisticsNote', meta.logisticsNote, '報關 / 收件 / 其他備註') +
        '</div>';
    }
    return '';
  }

  function paramLeadBlock(daysLabel, daysKey, daysVal, startKey, startVal, dueAt) {
    return '<div class="stage-params">' +
      '<div class="param-row"><label>' + UI.esc(daysLabel) + '</label>' +
      '<input type="number" min="0" class="meta-num" data-meta="' + daysKey + '" value="' +
      (daysVal != null ? UI.esc(String(daysVal)) : '') + '" placeholder="天數"></div>' +
      '<div class="param-row"><label>起始日</label>' +
      '<input type="date" class="meta-date" data-meta="' + startKey + '" value="' +
      UI.esc(msToDateInput(startVal)) + '"></div>' +
      '<div class="param-row"><label>預計完成</label>' +
      '<span class="param-due">' + (dueAt ? UI.esc(UI.fmtDate(dueAt)) : '—') + '</span></div>' +
      '</div>';
  }
  function logisticsRow(label, key, val, ph) {
    return '<div class="param-row"><label>' + UI.esc(label) + '</label>' +
      '<input type="text" class="meta-text" data-meta="' + key + '" value="' +
      UI.esc(val || '') + '" placeholder="' + UI.esc(ph) + '"></div>';
  }

  // 進度面板事件委派
  $('progress-body').addEventListener('click', function (e) {
    const eviBtn = e.target.closest('.task-evi-edit');
    if (eviBtn) { editTaskEvidence(eviBtn); return; }
    const light = e.target.closest('.task-light');
    if (light) { toggleTask(light); return; }
    const head = e.target.closest('.stage-block-head');
    if (head) { toggleStageBlock(head.dataset.toggle); return; }
    const step = e.target.closest('[data-stagestep]');
    if (step) { openStageBlock(step.dataset.stagestep); return; }
  });
  $('progress-body').addEventListener('change', function (e) {
    const el = e.target;
    if (!el.classList) return;
    if (el.classList.contains('meta-num')) {
      const v = el.value.trim();
      commitMeta(el.dataset.meta, v === '' ? '' : Number(v), true);
    } else if (el.classList.contains('meta-date')) {
      commitMeta(el.dataset.meta, dateInputToMs(el.value), true);
    }
  });
  $('progress-body').addEventListener('input', function (e) {
    const el = e.target;
    if (el.classList && el.classList.contains('meta-text')) {
      const key = el.dataset.meta;
      const val = el.value;
      const oid = currentOrderId; // 綁定打字當下的訂單:600ms 內切換也寫回原訂單,不污染他單
      clearTimeout(metaTextDebounce[key]);
      metaTextDebounce[key] = setTimeout(function () { commitMeta(key, val, false, oid); }, 600);
    }
  });

  function toggleStageBlock(stage) {
    expandedStages[stage] = !expandedStages[stage];
    if (progressData) renderProgress(progressData);
  }
  function openStageBlock(stage) {
    expandedStages[stage] = true;
    if (progressData) renderProgress(progressData);
    const block = $('progress-body').querySelector('.stage-block[data-stage="' + cssEsc(stage) + '"]');
    if (block) block.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function toggleTask(btn) {
    const taskKey = btn.dataset.task;
    const newDone = btn.dataset.done !== '1';
    btn.disabled = true;
    try {
      await API.putTaskFor(chatId, currentOrderId, taskKey, newDone);
      await loadProgress();  // currentStage 可能推進 → 整體重繪(保留展開狀態)
      loadCustomer();        // 頂欄/資訊階段徽章同步(整體模式;訂單模式不影響客戶階段)
      refreshAuditIfOpen();
    } catch (e) {
      btn.disabled = false;
      alert('切換失敗:' + e.message);
    }
  }

  // rerender=true(天數/起始日,會改預計完成)才整體重繪;物流文字不重繪以免打字中失焦
  async function commitMeta(key, value, rerender, orderId) {
