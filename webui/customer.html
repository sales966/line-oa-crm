  // ================= @ 提及自動完成 + 收集 =================
  const mentionInput = $('team-input');
  const mentionBox = $('mention-box');
  let pendingMentions = []; // {kind,targetUserId?,targetFileId?,label}
  let mentionAnchor = null; // {start,q}
  let mentionItems = [];    // 目前顯示的候選(扁平)
  let mentionSel = 0;

  // 收集仍出現在 body 內的 @提及(去重),供送出時帶上
  function collectMentions(body) {
    const out = [];
    const seen = {};
    pendingMentions.forEach(function (m) {
      if (body.indexOf('@' + m.label) === -1) return;
      const key = m.kind + ':' + (m.kind === 'file' ? m.targetFileId : m.targetUserId);
      if (seen[key]) return;
      seen[key] = true;
      out.push(m.kind === 'file'
        ? { kind: 'file', targetFileId: m.targetFileId }
        : { kind: 'user', targetUserId: m.targetUserId });
    });
    return out;
  }

  // 光標前的 @token:@ 前須為開頭或空白,token 內不含空白/@
  function currentMentionAnchor() {
    const val = mentionInput.value;
    const pos = mentionInput.selectionStart;
    if (pos == null) return null;
    let i = pos - 1;
    while (i >= 0) {
      const ch = val.charAt(i);
      if (ch === '@') {
        const prev = i > 0 ? val.charAt(i - 1) : '';
        if (i === 0 || /\s/.test(prev)) {
          const q = val.slice(i + 1, pos);
          if (/[\s@]/.test(q)) return null;
          return { start: i, q: q };
        }
        return null;
      }
      if (/\s/.test(ch)) return null;
      i--;
    }
    return null;
  }

  const doSuggest = UI.debounce(async function (anchor) {
    let data;
    try { data = await API.suggestMentions(chatId, anchor.q); }
    catch (e) { hideMentionBox(); return; }
    const now = currentMentionAnchor();
    if (!now || now.start !== anchor.start) return; // 使用者已改變輸入
    showMentionBox(data);
  }, 200);

  mentionInput.addEventListener('input', function () {
    const anchor = currentMentionAnchor();
    if (!anchor) { hideMentionBox(); return; }
    mentionAnchor = anchor;
    doSuggest(anchor);
  });
  // 捕獲階段攔截:選單開著時 ↑↓/Enter/Tab/Esc 操作候選,不觸發送出
  mentionInput.addEventListener('keydown', function (e) {
    if (mentionBox.hidden) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); e.stopImmediatePropagation(); moveMentionSel(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); e.stopImmediatePropagation(); moveMentionSel(-1); }
    else if (e.key === 'Enter') {
      if (e.isComposing || e.keyCode === 229) return;
      e.preventDefault(); e.stopImmediatePropagation(); applyMention(mentionSel);
    } else if (e.key === 'Tab') { e.preventDefault(); e.stopImmediatePropagation(); applyMention(mentionSel); }
    else if (e.key === 'Escape') { e.preventDefault(); e.stopImmediatePropagation(); hideMentionBox(); }
  }, true);
  mentionInput.addEventListener('blur', function () {
    setTimeout(hideMentionBox, 120); // 讓 mousedown 選取先完成
  });

  function showMentionBox(data) {
    const users = (data && data.users) || [];
    const files = (data && data.files) || [];
    mentionItems = [];
    let html = '';
    if (users.length) {
      html += '<div class="mention-group-title">同事</div>';
      users.forEach(function (u) {
        const label = u.displayName || u.name || '';
        const idx = mentionItems.length;
        mentionItems.push({ kind: 'user', targetUserId: u.id, label: label });
        html += '<div class="mention-row" data-idx="' + idx + '">' +
          '<span class="mention-row-text">@' + UI.esc(label) + '</span>' +
          (u.role ? UI.roleBadge(u.role) : '') + '</div>';
      });
    }
    if (files.length) {
      html += '<div class="mention-group-title">檔案</div>';
      files.forEach(function (f) {
        const label = f.fileName || '';
        const idx = mentionItems.length;
        mentionItems.push({ kind: 'file', targetFileId: f.id, label: label });
        html += '<div class="mention-row" data-idx="' + idx + '">' +
          '<span class="mention-row-text">📎 ' + UI.esc(label) + '</span></div>';
      });
    }
    if (mentionItems.length === 0) { hideMentionBox(); return; }
    mentionSel = 0;
    mentionBox.innerHTML = html;
    mentionBox.hidden = false;
    highlightMentionSel();
    Array.prototype.forEach.call(mentionBox.querySelectorAll('.mention-row'), function (row) {
      row.addEventListener('mousedown', function (e) {
        e.preventDefault(); // 別讓 textarea 失焦
        applyMention(Number(row.dataset.idx));
      });
    });
  }

  function moveMentionSel(d) {
    if (!mentionItems.length) return;
    mentionSel = (mentionSel + d + mentionItems.length) % mentionItems.length;
    highlightMentionSel();
  }
  function highlightMentionSel() {
    Array.prototype.forEach.call(mentionBox.querySelectorAll('.mention-row'), function (row) {
      row.classList.toggle('sel', Number(row.dataset.idx) === mentionSel);
    });
    const cur = mentionBox.querySelector('.mention-row.sel');
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }
  function hideMentionBox() {
    mentionBox.hidden = true;
    mentionItems = [];
  }

  function applyMention(idx) {
    const item = mentionItems[idx];
    if (!item) { hideMentionBox(); return; }
    const anchor = currentMentionAnchor() || mentionAnchor;
    if (!anchor) { hideMentionBox(); return; }
    const val = mentionInput.value;
    const pos = mentionInput.selectionStart;
    const insert = '@' + item.label + ' ';
    const before = val.slice(0, anchor.start);
    const after = val.slice(pos);
    mentionInput.value = before + insert + after;
    const caret = (before + insert).length;
    mentionInput.setSelectionRange(caret, caret);
    pendingMentions.push({
      kind: item.kind, targetUserId: item.targetUserId,
      targetFileId: item.targetFileId, label: item.label
    });
    hideMentionBox();
    mentionInput.focus();
  }

  // 依 mentions 陣列把 body 中的 @名字 / 📎檔名 高亮(全程 textContent/createElement,無 XSS)
  function mentionLabel(m) {
    if (!m) return '';
    if (m.kind === 'file') return m.label || m.fileName || m.name || m.targetFileName || '';
    return m.label || m.name || m.displayName || m.targetName || m.userName || '';
  }
  function renderBodyWithMentions(el, text, mentions) {
    el.textContent = '';
    text = text || '';
    const toks = [];
    (mentions || []).forEach(function (m) {
      const label = mentionLabel(m);
      if (!label) return;
      if (m.kind === 'file') {
        toks.push({ t: '📎 ' + label, kind: 'file', fileId: m.targetFileId });
        toks.push({ t: '@' + label, kind: 'file', fileId: m.targetFileId });
      } else {
        toks.push({ t: '@' + label, kind: 'user' });
      }
    });
    if (!toks.length) { el.textContent = text; return; }
    toks.sort(function (a, b) { return b.t.length - a.t.length; }); // 長標籤優先
    let buf = '';
    function flush() { if (buf) { el.appendChild(document.createTextNode(buf)); buf = ''; } }
    let i = 0;
    while (i < text.length) {
      let matched = null;
      for (let k = 0; k < toks.length; k++) {
        if (toks[k].t && text.startsWith(toks[k].t, i)) { matched = toks[k]; break; }
      }
      if (matched) {
        flush();
        const span = document.createElement('span');
        if (matched.kind === 'file') {
          span.className = 'mention mention-file';
          span.dataset.fileId = matched.fileId != null ? String(matched.fileId) : '';
          span.title = '點擊跳至檔案牆';
        } else {
          span.className = 'mention mention-user';
        }
        span.textContent = matched.t;
        el.appendChild(span);
        i += matched.t.length;
      } else {
        buf += text.charAt(i);
        i++;
      }
    }
    flush();
  }

  // ================= 檔案上傳(檔案牆:一般上傳 / 缺檔補件) =================
  // 上傳按鈕已改由「工作台上傳」區塊內的 .file-upload-trigger 觸發(files-body 事件委派)。
  let supplementMsgId = null; // 非 null 時,下一次檔案選取視為「上傳補件」,帶 lineMessageId 關聯占位
  let fileUploading = false;  // 防重複上傳

  // 帶額外欄位的上傳(供補件帶 lineMessageId);沿用 /files/upload 端點
  function uploadFileXhr(file, extraFields, onProgress) {
    return new Promise(function (resolve, reject) {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/customers/' + encodeURIComponent(chatId) + '/files/upload');
      xhr.responseType = 'json';
      xhr.setRequestHeader('Accept', 'application/json');
      if (xhr.upload && typeof onProgress === 'function') {
        xhr.upload.addEventListener('progress', function (e) {
          if (e.lengthComputable && e.total > 0) onProgress(e.loaded / e.total);
        });
      }
      xhr.addEventListener('load', function () {
        const data = xhr.response;
        if (xhr.status >= 200 && xhr.status < 300) { resolve(data || {}); return; }
        const err = new Error((data && (data.error || data.message)) || ('HTTP ' + xhr.status));
        err.status = xhr.status; err.data = data; reject(err);
      });
      xhr.addEventListener('error', function () {
        const err = new Error('無法連線到後端服務,請確認後端程式是否已啟動(連接埠 4680)');
        err.status = 0; reject(err);
      });
      const fd = new FormData();
      if (extraFields) Object.keys(extraFields).forEach(function (k) {
        if (extraFields[k] != null && extraFields[k] !== '') fd.append(k, String(extraFields[k]));
      });
      fd.append('file', file, file.name);
      xhr.send(fd);
    });
  }

  async function doFileUpload(file, lineMessageId) {
    if (fileUploading) return;
    fileUploading = true;
    const isSup = lineMessageId != null && lineMessageId !== '';
    const wrap = $('upload-progress');
    const fill = $('upload-fill');
    const label = $('upload-label');
    const err = $('upload-err');
    const verb = isSup ? '上傳補件… ' : '上傳中… ';
    err.hidden = true; err.textContent = '';
    wrap.hidden = false; fill.style.width = '0%'; label.textContent = verb + '0%';
    try {
      const onProg = function (r) {
        const pct = Math.round(r * 100);
        fill.style.width = pct + '%';
        label.textContent = verb + pct + '%';
      };
      // 補件走本地 XHR 以帶 lineMessageId 關聯占位;一般上傳沿用 API.uploadFile(內建 401 轉跳)
      if (isSup) await uploadFileXhr(file, { lineMessageId: lineMessageId }, onProg);
      else await API.uploadFile(chatId, file, onProg);
      fill.style.width = '100%'; label.textContent = '完成';
      setTimeout(function () { wrap.hidden = true; }, 800);
      await loadFiles();   // 補件成功後,若後端已關聯 lineMessageId,占位卡自然消失
      loadCustomer();      // 檔案數更新
    } catch (e) {
      wrap.hidden = true;
      if (e.status === 401) {
        location.href = 'login.html?next=' + encodeURIComponent(location.pathname + location.search);
        return;
      }
      err.hidden = false;
      err.textContent = (isSup ? '補件上傳失敗:' : '上傳失敗:') + e.message;
    } finally {
      fileUploading = false;
    }
  }

  // ================= 討論框 📎 上傳並分享 =================
  $('team-attach-btn').addEventListener('click', function () { $('team-file-input').click(); });
  $('team-file-input').addEventListener('change', function () {

  async function doTeamAttach(file) {
    const wrap = $('team-upload');
    const fill = $('team-upload-fill');
    const label = $('team-upload-label');
    const btn = $('team-attach-btn');
    const errBox = $('team-err');
    wrap.hidden = false; fill.style.width = '0%'; label.textContent = '上傳中… 0%';
    btn.disabled = true;
    let uploaded;
    try {
      uploaded = await API.uploadFile(chatId, file, function (r) {

    wrap.hidden = true; btn.disabled = false;
    const fileObj = (uploaded && uploaded.file) || {};
    const fileName = fileObj.fileName || file.name;
    loadFiles();    // 顯示新檔(source='upload')
    loadCustomer(); // 檔案數
    // 自動送出討論訊息:body 預填「📎 檔名」+ file mention
    try {
      const payload = { body: '📎 ' + fileName };
      if (fileObj.id != null) payload.mentions = [{ kind: 'file', targetFileId: fileObj.id }];
      const data = await API.postTeamMessage(chatId, payload);

  // ---- 檔案庫「拖曳到討論區」分享既有檔案(不重新上傳) ----
  // 拖曳來源:檔案卡(files-body 委派 dragstart)
  $('files-body').addEventListener('dragstart', function (e) {
    const card = e.target.closest('.file-card');
    if (!card) return;
    const id = card.getAttribute('data-file-id');
    const name = card.getAttribute('data-file-name') || '檔案';
    if (!id) return;
    e.dataTransfer.setData('application/x-lineoa-file', JSON.stringify({ id: id, name: name }));
    e.dataTransfer.effectAllowed = 'copy';
  });
  // 放置目標:內部討論面板
  (function () {
    const panel = document.querySelector('.team-panel');
    if (!panel) return;
    function hasFile(e) {
      return e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types || [], 'application/x-lineoa-file') >= 0;
    }
    panel.addEventListener('dragover', function (e) {
      if (!hasFile(e)) return;
      e.preventDefault(); e.dataTransfer.dropEffect = 'copy';
      panel.classList.add('drop-hover');
    });
    panel.addEventListener('dragleave', function (e) {
      if (e.target === panel || !panel.contains(e.relatedTarget)) panel.classList.remove('drop-hover');
    });
    panel.addEventListener('drop', function (e) {
      panel.classList.remove('drop-hover');
      const raw = e.dataTransfer.getData('application/x-lineoa-file');
      if (!raw) return;
      e.preventDefault();
      let obj; try { obj = JSON.parse(raw); } catch (x) { return; }
      const fid = parseInt(obj.id, 10);
      if (!isFinite(fid)) return;
      shareExistingFile(fid, obj.name || '檔案');
    });
  })();

  function renderOrderBar() {
    const parts = [];
    parts.push('<span class="order-bar-label">訂單</span>');
    parts.push('<button type="button" class="order-tab' + (currentOrderId === 0 ? ' active' : '') +
      '" data-order="0">整體</button>');
    ordersList.forEach(function (o) {
      const oid = Number(o.id);
      const active = oid === currentOrderId;
      // 有自訂標題時,子行補上日期範圍;標題本身即為範圍時不重複
      const sub = (o.title && String(o.title).trim()) ? orderRangeLabel(o) : '';
      parts.push(
        '<span class="order-tab' + (active ? ' active' : '') + '" data-order="' + oid +
        '" role="button" tabindex="0" title="切換到此訂單範圍">' +
        '<span class="order-tab-main">' + UI.esc(orderTabTitle(o)) + '</span>' +
        (sub ? '<span class="order-tab-sub">' + UI.esc(sub) + '</span>' : '') +
        '<span class="order-tab-actions">' +
        '<button type="button" class="order-tab-mini" data-edit="' + oid + '" title="編輯訂單">✎</button>' +
        '<button type="button" class="order-tab-mini" data-del="' + oid + '" title="刪除訂單">🗑</button>' +
        '</span></span>'
      );
    });
    parts.push('<button type="button" class="order-add-btn" data-add="1">➕ 新增訂單</button>');
    if (currentOrderId !== 0) {
      const cur = findOrder(currentOrderId);
      parts.push('<span class="order-scope-hint">目前檢視:' +
        UI.esc(cur ? orderTabTitle(cur) : ('訂單 #' + currentOrderId)) + ' 範圍(進度 / 總結 / 對話)</span>');
    }
    orderBar.innerHTML = parts.join('');
    orderBar.hidden = false;
  }

  // 切換 orderId:重載進度 / 總結 / 對話時間軸的範圍(死線橫幅由 loadProgress 內含更新)
  function switchOrder(orderId) {
    const oid = Number(orderId) || 0;
    if (oid === currentOrderId) return;
    currentOrderId = oid;
    orderReqSeq++; // 使前一訂單仍在途的 scoped 載入失效(下方三個載入捕獲新序號)
    renderOrderBar();
    loadProgress();
    loadSummary();
    loadMessages(null);
  }

  // 重載目前 orderId 範圍的三個面板(建立/編輯/刪除訂單後共用)
  function reloadScopedPanels() {
    orderReqSeq++; // 範圍已變(切換/日期改動)→ 使仍在途的舊 scoped 載入失效
    loadProgress();
    loadSummary();
    loadMessages(null);
  }

  orderBar.addEventListener('click', function (e) {
    const editBtn = e.target.closest('[data-edit]');
    if (editBtn) { openOrderModal(findOrder(Number(editBtn.dataset.edit))); return; }
    const delBtn = e.target.closest('[data-del]');
    if (delBtn) { removeOrder(Number(delBtn.dataset.del)); return; }
    const addBtn = e.target.closest('[data-add]');
    if (addBtn) { openOrderModal(null); return; }
    const tab = e.target.closest('[data-order]');
    if (tab) { switchOrder(Number(tab.dataset.order)); return; }
  });
  orderBar.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    // 真正的按鈕(✎/🗑 迷你鈕、整體/新增鈕)保有原生鍵盤啟用,勿攔成切換訂單;
    // 只有 role=button 的 <span> 訂單頁籤需要這段合成鍵盤處理
    if (e.target.closest('button')) return;
    const tab = e.target.closest('[data-order]');
    if (tab && tab.getAttribute('role') === 'button') {
      e.preventDefault();
      switchOrder(Number(tab.dataset.order));
    }
  });

  // 新增 / 編輯訂單浮層(order=null 建立,否則編輯)
  function openOrderModal(order) {
    if (document.getElementById('order-overlay')) return;
    const isEdit = !!order;
    const overlay = document.createElement('div');
    overlay.id = 'order-overlay';
    overlay.className = 'modal-overlay';
    const card = document.createElement('div');
    card.className = 'modal-card';
    const fromVal = isEdit && order.fromDate ? msToDateInput(order.fromDate) : '';
    const toVal = isEdit && order.toDate ? msToDateInput(order.toDate) : '';
    const titleVal = isEdit && order.title ? String(order.title) : '';
    card.innerHTML =
      '<h2>' + (isEdit ? '編輯訂單' : '新增訂單') + '</h2>' +
      '<div class="order-modal-row">' +
      '<div class="order-modal-field"><label for="order-from">起始日期</label>' +
      '<input id="order-from" type="date" value="' + UI.esc(fromVal) + '"></div>' +
      '<div class="order-modal-field"><label for="order-to">結束日期</label>' +
      '<input id="order-to" type="date" value="' + UI.esc(toVal) + '"></div>' +
      '</div>' +
      '<div class="order-modal-field"><label for="order-title">標題(可選,預設「訂單 M/D~M/D」)</label>' +
      '<input id="order-title" type="text" maxlength="60" placeholder="例:中秋禮盒 3000 個" value="' +
      UI.esc(titleVal) + '"></div>' +
      '<div class="modal-err" id="order-err"></div>' +
      '<div class="modal-actions">' +
      '<button type="button" class="btn" id="order-cancel">取消</button>' +
      '<button type="button" class="btn primary" id="order-ok">' + (isEdit ? '儲存' : '建立') + '</button>' +
      '</div>';
    overlay.appendChild(card);
    document.body.appendChild(overlay);

    const errBox = card.querySelector('#order-err');
    const okBtn = card.querySelector('#order-ok');
    function close() { overlay.remove(); }

    async function submit() {
      const fromMs = dateInputToMs(card.querySelector('#order-from').value);
      let toMs = dateInputToMs(card.querySelector('#order-to').value);
      const title = card.querySelector('#order-title').value.trim();
      if (!fromMs || !toMs) { errBox.textContent = '請選擇起始與結束日期'; return; }
      if (toMs < fromMs) { errBox.textContent = '結束日期不可早於起始日期'; return; }
      // 結束日含當日:存當日 23:59:59.999(顯示仍為 23:59:59,契約建議;
      // 用 -1ms 而非 -1000ms,消除後端 BETWEEN 閉區間在最後一秒內的亞秒級漏窗)
      toMs = toMs + (24 * 60 * 60 * 1000 - 1);
      const body = { fromDate: fromMs, toDate: toMs };
      if (title) body.title = title;
      errBox.textContent = '';
      okBtn.disabled = true;
      try {
        if (isEdit) {
          await API.updateOrder(chatId, order.id, body);
          await loadOrders();
          if (currentOrderId === Number(order.id)) reloadScopedPanels(); // 日期範圍改變 → 重載
          close();
        } else {
          const res = await API.createOrder(chatId, body);
          const newId = res && res.order && res.order.id ? Number(res.order.id) : 0;
          await loadOrders();
          close();
          if (newId) {
            currentOrderId = newId;
            renderOrderBar();
            reloadScopedPanels();
            alert('訂單已建立。可於右上角按「重新生成總結」為此訂單的日期範圍產生總結。');
          }
        }
      } catch (e) {
        errBox.textContent = (isEdit ? '儲存' : '建立') + '失敗:' + e.message;
        okBtn.disabled = false;
      }
    }
    okBtn.addEventListener('click', submit);
    card.querySelector('#order-cancel').addEventListener('click', close);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        if (e.isComposing || e.keyCode === 229) return; // 輸入法選字中
        e.preventDefault();
        submit();
      }
    });
    card.querySelector('#order-from').focus();
  }

  async function removeOrder(orderId) {
    const o = findOrder(orderId);
    const name = o ? orderTabTitle(o) : ('訂單 #' + orderId);
    if (!window.confirm('確定刪除「' + name + '」?此訂單的總結與進度將一併刪除,且無法復原。')) return;
    try {
      await API.deleteOrder(chatId, orderId);
    } catch (e) {
      alert('刪除失敗:' + (e.status === 403 ? '僅限管理員或建立者可刪除' : e.message));
      return;
    }
    if (currentOrderId === Number(orderId)) currentOrderId = 0; // 刪的是當前訂單 → 回整體
    await loadOrders();
    reloadScopedPanels();
  }

  // ================= 啟動 =================
  (async function init() {
    $('page-state').innerHTML = UI.loadingHtml('載入客戶資料…');
    teamScroll.innerHTML = UI.loadingHtml('載入內部討論…');
    // 先 me(掛右上角使用者 chip);401 由 api.js 統一轉跳 login.html
    if (!(await UI.initAuth())) {
      $('page-state').innerHTML = UI.errorHtml('未登入或無法連線到後端服務');
      return;
    }
    // 先載檔案(建立 hash→連結對照),再載訊息;其餘並行
    await Promise.allSettled([
      loadCustomer(), loadFiles(), loadNotes(), loadSummary(),
      loadSyncStatus(), loadProgress(), loadOrders(), pollTeamMessages(true)
    ]);
    $('page-state').innerHTML = '';
    $('detail-grid').hidden = false;
    await loadMessages(null);
    // 由鈴鐺通知跳入(focus=team):捲到內部討論並閃爍
    if (UI.qsParam('focus') === 'team') {
      const panel = document.querySelector('.team-panel');
      if (panel) {
        panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
        panel.classList.add('flash');
        setTimeout(function () { panel.classList.remove('flash'); }, 2000);
      }
    }
  })();
})();
</script>
</body>
</html>
